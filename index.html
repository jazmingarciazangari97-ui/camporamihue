// ── FOTO REMITO ───────────────────────────────────────────
function FotoModal({open,onClose,onDatos}){
  const [loading,setLoading]=useState(false);
  const [preview,setPreview]=useState(null);
  const [b64,setB64]=useState(null);
  const [err,setErr]=useState("");
  const ref=useRef();
  const onFile=file=>{if(!file)return;const r=new FileReader();r.onload=e=>{setPreview(e.target.result);setB64(e.target.result.split(",")[1]);setErr("");};r.readAsDataURL(file);};
  const analizar=async()=>{
    if(!b64)return;setLoading(true);setErr("");
    try{
      const res=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:b64}},{type:"text",text:'Analizá este remito/factura. Respondé SOLO con JSON válido:\n{"proveedor":"","concepto":"desc breve","monto":0,"categoria":"Ferretería|Veterinaria|Repuestos|Combustible|Semillas|Agroquímicos|Otros","factura":"","fecha":"YYYY-MM-DD o vacio","items":"productos separados por coma"}\nMonto numérico sin símbolos.'}]}]})});
      const data=await res.json();
      const txt=(data.content||[]).map(c=>c.text||"").join("");
      onDatos(JSON.parse(txt.replace(/```json|```/g,"").trim()));
      setPreview(null);setB64(null);onClose();
    }catch(e){setErr("No se pudo leer. Intentá con foto más clara.");}
    setLoading(false);
  };
  const reset=()=>{setPreview(null);setB64(null);setErr("");};
  if(!open)return null;
  return(
    <Modal open title="📷 Escanear Remito / Factura" onClose={()=>{reset();onClose();}}>
      <InfoBox text="Sacá foto al remito → la IA extrae el proveedor, productos y monto solo." color="orange" emoji="✨"/>
      <input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={e=>onFile(e.target.files[0])}/>
      {!preview
        ?<div style={{display:"flex",flexDirection:"column",gap:10}}>
          <button onClick={()=>{ref.current.setAttribute("capture","environment");ref.current.click();}} style={{background:`linear-gradient(135deg,${C.na},${C.na2})`,color:"#fff",border:"none",borderRadius:14,padding:"16px",fontSize:"1rem",fontWeight:900,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontFamily:"inherit",boxShadow:`0 4px 16px ${C.na}44`}}>📷 Sacar foto ahora</button>
          <button onClick={()=>{ref.current.removeAttribute("capture");ref.current.click();}} style={{background:"#f0f4f8",color:C.dk2,border:"none",borderRadius:14,padding:"14px",fontSize:"0.9rem",fontWeight:800,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:10,fontFamily:"inherit"}}>🖼️ Elegir de galería</button>
          {err&&<div style={{background:C.ro3,color:C.ro,borderRadius:10,padding:"10px 14px",fontSize:"0.8rem",fontWeight:700}}>{err}</div>}
        </div>
        :<div>
          <img src={preview} alt="remito" style={{width:"100%",borderRadius:12,marginBottom:12,maxHeight:230,objectFit:"contain",background:"#f0f4f8"}}/>
          {loading
            ?<div style={{textAlign:"center",padding:"16px 0"}}><div style={{fontSize:"2rem",marginBottom:6}}>🔍</div><div style={{fontWeight:800,color:C.az,fontSize:"0.9rem"}}>Leyendo el remito...</div></div>
            :<div style={{display:"flex",gap:8}}><Btn v="ghost" onClick={reset} sx={{flex:1,justifyContent:"center"}}>🔄 Otra foto</Btn><Btn v="orange" onClick={analizar} sx={{flex:2,justifyContent:"center"}}>✨ Analizar</Btn></div>}
          {err&&<div style={{background:C.ro3,color:C.ro,borderRadius:10,padding:"10px 14px",marginTop:10,fontSize:"0.8rem",fontWeight:700}}>{err}</div>}
        </div>}
      <div style={{marginTop:12}}><Btn v="ghost" onClick={()=>{reset();onClose();}} sx={{width:"100%",justifyContent:"center"}}>Cancelar</Btn></div>
    </Modal>
  );
}

// ── DASHBOARD ─────────────────────────────────────────────
function SecDash({db}){
  const gm=db.gastos.filter(g=>g.fecha.startsWith(mesActual())).reduce((s,g)=>s+g.monto,0);
  const tc=db.cosechas.reduce((s,c)=>s+(c.netos||0),0);
  const mmMes=db.lluvias.filter(l=>l.fecha.startsWith(mesActual())).reduce((s,l)=>s+parseFloat(l.mm||0),0);
  const alertas=[];
  db.tareas.filter(t=>t.est!=="Completada"&&t.prioridad==="Urgente").forEach(t=>alertas.push({i:"🚨",t:`Tarea urgente: ${t.nom}`}));
  db.insumos.filter(i=>parseFloat(i.qty)<=0).forEach(i=>alertas.push({i:"📦",t:`Sin stock: ${i.nom}`}));
  db.maquinas.filter(m=>m.hs&&m.serv&&parseInt(m.hs)>=parseInt(m.serv)).forEach(m=>alertas.push({i:"🚜",t:`Servicio vencido: ${m.nom}`}));
  const h30=new Date();h30.setDate(h30.getDate()+30);
  db.sanidad.filter(s=>s.proxima&&new Date(s.proxima)<=h30&&s.estado!=="Realizada").forEach(s=>alertas.push({i:"💊",t:`Sanidad próxima: ${s.descripcion}`}));
  return(
    <div>
      {alertas.length>0&&<div style={{background:`linear-gradient(135deg,${C.ro3},#fff8f8)`,border:`1.5px solid ${C.na2}`,borderRadius:16,padding:14,marginBottom:14}}>
        <div style={{fontSize:"0.75rem",fontWeight:800,color:C.ro,textTransform:"uppercase",marginBottom:8}}>⚠️ Alertas ({alertas.length})</div>
        {alertas.slice(0,5).map((a,i)=><div key={i} style={{fontSize:"0.82rem",padding:"5px 0",borderBottom:i<alertas.length-1?"1px solid #fde8e8":"none",display:"flex",gap:8}}><span>{a.i}</span><span>{a.t}</span></div>)}
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:9,marginBottom:14}}>
        <SC num={db.campos.length} label="Campos" acc={`linear-gradient(90deg,${C.v},${C.v2})`} emoji="🌾"/>
        <SC num={db.lotes.length} label="Lotes" acc={`linear-gradient(90deg,${C.az},${C.az2})`} emoji="🗺️"/>
        <SC num={fmt(db.animales.reduce((s,a)=>s+a.cant,0))} label="Animales" acc={`linear-gradient(90deg,${C.na},${C.na2})`} emoji="🐄"/>
        <SC num={db.silos.filter(s=>s.estado==="Activa").length} label="Silobolsas" acc={`linear-gradient(90deg,${C.am},#f0c020)`} emoji="🛍️"/>
        <SC num={"$"+fmt(gm)} label="Gastos mes" acc={`linear-gradient(90deg,${C.ro},#f07070)`} emoji="💰"/>
        <SC num={(tc/1000).toFixed(1)+" t"} label="Cosecha" acc={`linear-gradient(90deg,${C.ce},#14a8b4)`} emoji="🌽"/>
        <SC num={mmMes.toFixed(0)+" mm"} label="Lluvia mes" acc={`linear-gradient(90deg,${C.az},${C.az2})`} emoji="🌧️"/>
        <SC num={db.tareas.filter(t=>t.est!=="Completada").length} label="Tareas" acc={`linear-gradient(90deg,${C.vi},#7c6be8)`} emoji="📅"/>
      </div>
      <Panel title="📋 Últimos movimientos">
        {!db.movs.length?<div style={{textAlign:"center",padding:20,color:C.lt}}>Sin movimientos aún</div>
        :db.movs.slice(0,8).map((m,i)=>(
          <div key={i} style={{display:"flex",gap:9,padding:"8px 10px",background:C.bg,borderRadius:11,marginBottom:5,fontSize:"0.8rem"}}>
            <span style={{fontSize:"0.65rem",color:C.lt,fontWeight:700,minWidth:64,flexShrink:0}}>{m.f}</span>
            <span style={{color:C.dk2}}>{m.t}</span>
          </div>
        ))}
      </Panel>
    </div>
  );
}

// ── CAMPOS & LOTES ────────────────────────────────────────
function SecCampos({db,setDb}){
  const [ya,setYa]=useState(db.years[db.years.length-1]);
  const [mC,setMC]=useState(false);const [mL,setML]=useState(false);
  const [busqueda,setBusqueda]=useState("");
  const [f,setF]=useState({});const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const addYear=()=>{const y=prompt("Año de campaña:",(parseInt(db.years[db.years.length-1])+1).toString());if(y&&!db.years.includes(y)){setDb({...db,years:[...db.years,y].sort()});setYa(y);}};
  const estB={"Barbecho":"gray","Sembrado":"green","En desarrollo":"blue","Listo cosechar":"yellow","Cosechado":"orange"};

  // Filtrar campos y lotes por búsqueda
  const bq=busqueda.toLowerCase().trim();
  const camposFiltrados=db.campos.filter(c=>{
    if(!bq)return true;
    const lotes=db.lotes.filter(l=>l.campoId==c.id&&l.anio==ya);
    return(
      c.nombre.toLowerCase().includes(bq)||
      c.localidad.toLowerCase().includes(bq)||
      lotes.some(l=>l.nom.toLowerCase().includes(bq)||l.cereal.toLowerCase().includes(bq)||l.variedad.toLowerCase().includes(bq)||l.estado.toLowerCase().includes(bq))
    );
  });

  // Costo por lote
  const costoPorLote=(loteId,loteNom,anio)=>{
    const retLote=db.retiros.filter(r=>r.lote===loteNom&&r.anio===anio);
    const gasLote=db.gastos.filter(g=>g.loteId===loteId);
    const costoIns=retLote.reduce((s,r)=>{const ins=db.insumos.find(i=>i.id===r.insId);return s+(ins?parseFloat(ins.precio||0)*parseFloat(r.qty||0):0);},0);
    const costoGas=gasLote.reduce((s,g)=>s+parseFloat(g.monto||0),0);
    return costoIns+costoGas;
  };

  return(
    <div>
      <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:12}}>
        <Btn onClick={()=>{setF({});setMC(true);}}>+ Campo</Btn>
        <Btn v="blue" onClick={()=>{setF({campoId:(db.campos[0]&&db.campos[0].id),anio:ya,estado:"Sembrado",cereal:"Soja"});setML(true);}}>+ Lote</Btn>
      </div>
      {/* BUSCADOR */}
      <div style={{position:"relative",marginBottom:12}}>
        <input
          type="text"
          value={busqueda}
          onChange={e=>setBusqueda(e.target.value)}
          placeholder="🔍 Buscar por campo, lote, cultivo o estado..."
          style={{width:"100%",padding:"11px 14px 11px 38px",border:"1.5px solid #e2e8f0",borderRadius:13,fontFamily:"inherit",fontSize:"0.9rem",color:C.dk,background:"#fff",outline:"none"}}
        />
        <span style={{position:"absolute",left:13,top:"50%",transform:"translateY(-50%)",fontSize:"1rem",pointerEvents:"none"}}>🔍</span>
        {busqueda&&<button onClick={()=>setBusqueda("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",fontSize:"1rem",color:C.md}}>✕</button>}
      </div>
      {busqueda&&<div style={{fontSize:"0.78rem",color:C.vi,fontWeight:700,marginBottom:8}}>{camposFiltrados.length} resultado{camposFiltrados.length!==1?"s":""} para "{busqueda}"</div>}

      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12,flexWrap:"wrap"}}>
        <span style={{fontSize:"0.75rem",fontWeight:800,color:C.md}}>Campaña:</span>
        {db.years.map(y=><button key={y} onClick={()=>setYa(y)} style={{padding:"6px 14px",borderRadius:30,border:`1.5px solid ${y===ya?C.az:"#e2e8f0"}`,background:y===ya?C.az:"#fff",color:y===ya?"#fff":C.md,fontSize:"0.76rem",fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>{y}/{parseInt(y)+1}</button>)}
        <Btn v="ghost" sz="sm" onClick={addYear}>+ Año</Btn>
      </div>
      {!db.campos.length?<div style={{textAlign:"center",padding:40,color:C.lt}}><div style={{fontSize:"2.5rem"}}>🌾</div><p style={{fontWeight:600,marginTop:8}}>Agregá tu primer campo</p></div>
      :camposFiltrados.length===0?<div style={{textAlign:"center",padding:30,color:C.lt}}><div style={{fontSize:"2rem"}}>🔍</div><p style={{marginTop:8}}>Sin resultados para "{busqueda}"</p></div>
      :camposFiltrados.map(c=>{
        const lotesTodos=db.lotes.filter(l=>l.campoId==c.id&&l.anio==ya);
        const lotes=bq?lotesTodos.filter(l=>l.nom.toLowerCase().includes(bq)||l.cereal.toLowerCase().includes(bq)||l.variedad.toLowerCase().includes(bq)||l.estado.toLowerCase().includes(bq)||!bq):lotesTodos;
        return(
          <Panel key={c.id} accent={C.v}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:12}}>
              <div>
                <div style={{fontSize:"1rem",fontWeight:900}}>🌾 {c.nombre}</div>
                <div style={{fontSize:"0.74rem",color:C.md,marginTop:2}}>📍 {c.localidad||"—"} · {c.ha||"?"} ha · {c.propietario||"—"}</div>
                {c.notas&&<div style={{fontSize:"0.72rem",color:C.md,marginTop:2}}>{c.notas}</div>}
              </div>
              <div style={{display:"flex",gap:5}}>
                <Btn sz="xs" v="blue" onClick={()=>{setF({campoId:c.id,anio:ya,estado:"Sembrado",cereal:"Soja"});setML(true);}}>+ Lote</Btn>
                <Btn sz="xs" v="ghost" onClick={()=>{setF({...c});setMC(true);}}>✏️</Btn>
                <Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar campo?"))setDb({...db,campos:db.campos.filter(x=>x.id!==c.id)});}}>🗑️</Btn>
              </div>
            </div>
            {!lotes.length?<div style={{textAlign:"center",padding:"12px",color:C.lt,fontSize:"0.8rem"}}>Sin lotes en campaña {ya}/{parseInt(ya)+1}</div>
            :lotes.map(l=>{
              const costo=costoPorLote(l.id,l.nom,ya);
              const ha=parseFloat(l.ha)||1;
              return(
                <div key={l.id} style={{background:C.bg,borderRadius:13,padding:13,marginBottom:9}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:900,fontSize:"0.95rem"}}>{l.nom} <span style={{fontSize:"0.78rem",color:C.md}}>— {l.ha||"?"} ha</span></div>
                      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginTop:5}}>
                        <Bdg label={l.cereal||"—"} col="green"/>
                        {l.variedad&&<span style={{fontSize:"0.74rem",color:C.md,fontWeight:600}}>{l.variedad}</span>}
                        <Bdg label={l.estado||"—"} col={estB[l.estado]||"gray"}/>
                      </div>
                      {l.siembra&&<div style={{fontSize:"0.72rem",color:C.md,marginTop:4}}>📅 Siembra: {l.siembra}</div>}
                      {(l.semillaKg||l.fertTipo||l.ureaKg)&&(
                        <div style={{marginTop:6,fontSize:"0.72rem",color:C.md,display:"flex",gap:10,flexWrap:"wrap"}}>
                          {l.semillaKg&&<span>🌱 {l.semillaKg} kg/ha</span>}
                          {l.fertTipo&&<span>🧪 {l.fertTipo} {l.fertKg&&`${l.fertKg}kg/ha`}</span>}
                          {l.ureaKg&&<span>⚗️ Urea {l.ureaKg} kg/ha</span>}
                        </div>
                      )}
                      {costo>0&&<div style={{fontSize:"0.72rem",color:C.na,fontWeight:700,marginTop:4}}>💰 Costo: ${fmt(costo)} total · ${fmt(Math.round(costo/ha))}/ha</div>}
                    </div>
                    <div style={{display:"flex",gap:4}}>
                      <Btn sz="xs" v="ghost" onClick={()=>{setF({...l});setML(true);}}>✏️</Btn>
                      <Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar lote?"))setDb({...db,lotes:db.lotes.filter(x=>x.id!==l.id)});}}>🗑️</Btn>
                    </div>
                  </div>
                </div>
              );
            })}
          </Panel>
        );
      })}

      {/* MODAL CAMPO */}
      <Modal open={mC} onClose={()=>{setMC(false);setF({});}} title={f.id?"✏️ Editar Campo":"🌾 Nuevo Campo"}>
        <FR><Inp label="Nombre" value={f.nombre||""} onChange={v=>sf("nombre",v)} placeholder="Ej: La Esperanza"/><Inp label="Localidad" value={f.localidad||""} onChange={v=>sf("localidad",v)}/></FR>
        <FR><Inp label="Hectáreas totales" type="number" value={f.ha||""} onChange={v=>sf("ha",v)}/><Inp label="Propietario" value={f.propietario||""} onChange={v=>sf("propietario",v)}/></FR>
        <Inp label="Notas (acceso, arrendamiento...)" value={f.notas||""} onChange={v=>sf("notas",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>setMC(false)} onSave={()=>{if(!f.nombre)return alert("Ingresá el nombre");const nd=f.id?addMov({...db,campos:db.campos.map(x=>x.id===f.id?{...f}:x)},`✏️ Campo editado: ${f.nombre}`):addMov({...db,campos:[...db.campos,{id:Date.now(),...f}]},`🌾 Campo: ${f.nombre}`);setDb(nd);setMC(false);setF({});}}/>
      </Modal>

      {/* MODAL LOTE */}
      <Modal open={mL} onClose={()=>{setML(false);setF({});}} title={f.id?"✏️ Editar Lote":"🗺️ Nuevo Lote"}>
        <FR><Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/><Inp label="Nombre del lote" value={f.nom||""} onChange={v=>sf("nom",v)} placeholder="Ej: Lote 1 Norte"/></FR>
        <FR><Inp label="Hectáreas" type="number" value={f.ha||""} onChange={v=>sf("ha",v)}/><Inp label="Campaña" value={f.anio||ya} onChange={v=>sf("anio",v)} opts={db.years}/></FR>
        <div style={{background:C.v3,border:"1.5px solid #b8f0d8",borderRadius:14,padding:14,marginBottom:10}}>
          <div style={{fontSize:"0.72rem",fontWeight:800,color:C.v,textTransform:"uppercase",marginBottom:10}}>🌱 Cultivo y siembra</div>
          <FR><Inp label="Cereal" value={f.cereal||"Soja"} onChange={v=>sf("cereal",v)} opts={CERALES}/><Inp label="Variedad / Híbrido" value={f.variedad||""} onChange={v=>sf("variedad",v)} placeholder="Ej: DM 4670 STS"/></FR>
          <FR><Inp label="Fecha de siembra" type="date" value={f.siembra||hoy()} onChange={v=>sf("siembra",v)}/><Inp label="Estado" value={f.estado||"Sembrado"} onChange={v=>sf("estado",v)} opts={["Barbecho","Sembrado","En desarrollo","Listo cosechar","Cosechado"]}/></FR>
          <FR><Inp label="Semilla (kg/ha)" type="number" value={f.semillaKg||""} onChange={v=>sf("semillaKg",v)} placeholder="Ej: 65"/><Inp label="Fertilizante tipo" value={f.fertTipo||""} onChange={v=>sf("fertTipo",v)} placeholder="Ej: MAP, Superfosfato"/></FR>
          <FR><Inp label="Fertilizante (kg/ha)" type="number" value={f.fertKg||""} onChange={v=>sf("fertKg",v)}/><Inp label="Urea (kg/ha)" type="number" value={f.ureaKg||""} onChange={v=>sf("ureaKg",v)}/></FR>
        </div>
        <MBtns onClose={()=>setML(false)} onSave={()=>{if(!f.nom)return alert("Ingresá nombre del lote");const nd=f.id?addMov({...db,lotes:db.lotes.map(x=>x.id===f.id?{...f}:x)},`✏️ Lote editado: ${f.nom}`):addMov({...db,lotes:[...db.lotes,{id:Date.now(),...f,anio:f.anio||ya}]},`🗺️ Lote ${f.nom} – ${f.cereal||""}`);setDb(nd);setML(false);setF({});}}/>
      </Modal>
    </div>
  );
}

// ── ANIMALES ──────────────────────────────────────────────
function SecAnimales({db,setDb}){
  const [tab,setTab]=useState("stock");
  const [mEdit,setMEdit]=useState(false);
  const [mMov,setMov]=useState(false);
  const [mTrasl,setMTrasl]=useState(false);
  const [mMort,setMMort]=useState(false);
  const [mNac,setMNac]=useState(false);
  const [f,setF]=useState({});const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const CATS=["Vacas","Novillos","Novillitos","Terneros","Vaquillonas","Toros","Cerdos","Ovinos","Caballos","Otro"];

  const stockPorCampo={};
  db.animales.forEach(a=>{
    const cid=a.campoId;
    if(!stockPorCampo[cid])stockPorCampo[cid]={};
    if(!stockPorCampo[cid][a.cat])stockPorCampo[cid][a.cat]={cant:0,machos:0,hembras:0};
    stockPorCampo[cid][a.cat].cant+=parseInt(a.cant)||0;
    stockPorCampo[cid][a.cat].machos+=parseInt(a.machos)||0;
    stockPorCampo[cid][a.cat].hembras+=parseInt(a.hembras)||0;
  });
  const totGen={};
  db.animales.forEach(a=>{totGen[a.cat]=(totGen[a.cat]||0)+(parseInt(a.cant)||0);});

  const editarStock=(campoId,cat)=>{
    const d=(stockPorCampo[campoId]&&stockPorCampo[campoId][cat])||{cant:0,machos:0,hembras:0};
    setF({campoId,cat,cant:d.cant,machos:d.machos,hembras:d.hembras,_edit:true});
    setMEdit(true);
  };

  const guardarStock=()=>{
    const nuevos=db.animales.filter(a=>!(a.campoId==f.campoId&&a.cat===f.cat));
    const cant=parseInt(f.cant)||0;
    if(cant>0){nuevos.push({id:Date.now(),campoId:f.campoId,cat:f.cat,cant,machos:parseInt(f.machos)||0,hembras:parseInt(f.hembras)||0,fecha:hoy()});}
    const nd=addMov({...db,animales:nuevos},`✏️ Stock: ${f.cat} en ${camNom(db,f.campoId)} → ${cant}`);
    setDb(nd);setMEdit(false);setF({});
  };

  const mb={"Compra":"green","Venta":"red","Traslado":"blue","Muerte":"red","Nacimiento":"green","Ajuste":"yellow"};

  return(
    <div>
      <Tabs items={[{id:"stock",label:"🐄 Stock"},{id:"movs",label:"📋 Historial"},{id:"mort",label:"💀 Bajas"}]} active={tab} onChange={setTab}/>

      {tab==="stock"&&<>
        <div style={{display:"flex",gap:7,flexWrap:"wrap",marginBottom:12}}>
          <Btn onClick={()=>{setF({tipo:"Compra",fecha:hoy(),campoId:(db.campos[0]&&db.campos[0].id),modalidad:"Blanco"});setMov(true);}}>🐄 Compra/Venta</Btn>
          <Btn v="green" sz="sm" onClick={()=>{setF({fecha:hoy(),campoId:(db.campos[0]&&db.campos[0].id),cat:"Vacas",cant:"",machos:"",hembras:""});setMEdit(true);}}>➕ Agregar / Editar</Btn>
          <Btn v="teal" sz="sm" onClick={()=>{setF({fecha:hoy(),campoId:(db.campos[0]&&db.campos[0].id),cat:"Terneros",cant:""});setMNac(true);}}>🍼 Nacimientos</Btn>
          <Btn v="blue" sz="sm" onClick={()=>{setF({fecha:hoy(),campoOrigen:(db.campos[0]&&db.campos[0].id),campoDestino:(db.campos[1]&&db.campos[1].id)||(db.campos[0]&&db.campos[0].id)});setMTrasl(true);}}>↔️ Traslado</Btn>
          <Btn v="red" sz="sm" onClick={()=>{setF({fecha:hoy(),campoId:(db.campos[0]&&db.campos[0].id),causa:"Enfermedad"});setMMort(true);}}>💀 Baja</Btn>
        </div>

        {Object.keys(totGen).length>0&&<Panel title="📊 Total general" accent={C.na}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8}}>
            {Object.entries(totGen).map(([cat,tot])=>(
              <div key={cat} style={{background:C.bg,borderRadius:11,padding:"10px 8px",textAlign:"center"}}>
                <div style={{fontSize:"0.65rem",fontWeight:800,color:C.md,textTransform:"uppercase"}}>{cat}</div>
                <div style={{fontSize:"1.4rem",fontWeight:900,color:C.dk}}>{fmt(tot)}</div>
                <div style={{fontSize:"0.65rem",color:C.lt}}>cabezas</div>
              </div>
            ))}
          </div>
        </Panel>}

        {db.campos.map(campo=>{
          const cats=stockPorCampo[campo.id];
          if(!cats||!Object.keys(cats).length)return(
            <Panel key={campo.id} title={`🌾 ${campo.nombre}`} accent={C.v}>
              <div style={{textAlign:"center",padding:"12px",color:C.lt,fontSize:"0.8rem"}}>Sin animales en este campo</div>
              <button onClick={()=>{setF({campoId:campo.id,cat:"Vacas",cant:"",machos:"",hembras:""});setMEdit(true);}} style={{width:"100%",background:"#fff",border:"1.5px dashed #e2e8f0",borderRadius:11,padding:"9px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,color:C.md,fontSize:"0.8rem",marginTop:4}}>+ Agregar animales en {campo.nombre}</button>
            </Panel>
          );
          return(
            <Panel key={campo.id} title={`🌾 ${campo.nombre}`} accent={C.v}>
              {Object.entries(cats).map(([cat,d])=>(
                <div key={cat} style={{background:C.bg,borderRadius:12,padding:"11px 13px",marginBottom:8,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontWeight:900,fontSize:"0.92rem"}}>🐄 {cat}</div>
                    {(d.machos>0||d.hembras>0)&&<div style={{fontSize:"0.72rem",color:C.md,marginTop:3}}>♂ {d.machos} machos · ♀ {d.hembras} hembras</div>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <div style={{textAlign:"right"}}>
                      <div style={{fontSize:"1.6rem",fontWeight:900,color:C.v,lineHeight:1}}>{fmt(d.cant)}</div>
                      <div style={{fontSize:"0.65rem",color:C.lt}}>cabezas</div>
                    </div>
                    <button onClick={()=>editarStock(campo.id,cat)} style={{background:C.az3,border:`1.5px solid ${C.az2}`,borderRadius:10,padding:"8px 12px",cursor:"pointer",fontFamily:"inherit",fontWeight:800,color:C.az,fontSize:"0.8rem"}}>✏️</button>
                  </div>
                </div>
              ))}
              <button onClick={()=>{setF({campoId:campo.id,cat:"Vacas",cant:"",machos:"",hembras:""});setMEdit(true);}} style={{width:"100%",background:"#fff",border:"1.5px dashed #e2e8f0",borderRadius:11,padding:"9px",cursor:"pointer",fontFamily:"inherit",fontWeight:700,color:C.md,fontSize:"0.8rem",marginTop:4}}>+ Agregar categoría en {campo.nombre}</button>
            </Panel>
          );
        })}

        {!db.campos.length&&<div style={{textAlign:"center",padding:40,color:C.lt}}><div style={{fontSize:"3rem"}}>🐄</div><p style={{marginTop:8,fontWeight:600}}>Primero agregá un campo</p></div>}
      </>}

      {tab==="movs"&&<>
        <Tabla heads={["Fecha","Campo","Categoría","Tipo","Cant.","$/cab","Nota",""]}
          rows={db.movAnim.slice().reverse().map(m=><tr key={m.id}>
            <Td>{m.fecha}</Td>
            <Td>{m.tipo==="Traslado"?`${camNom(db,m.campoOrigen)}→${camNom(db,m.campoDestino)}`:camNom(db,m.campoId)}</Td>
            <Td bold>{m.cat}</Td>
            <Td><Bdg label={m.tipo} col={mb[m.tipo]||"gray"}/></Td>
            <Td>{m.cant}</Td>
            <Td>{m.precio?"$"+fmt(m.precio):"—"}</Td>
            <Td>{m.nota||"—"}</Td>
            <Td><Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,movAnim:db.movAnim.filter(x=>x.id!==m.id)});}}>🗑️</Btn></Td>
          </tr>)}/>
      </>}

      {tab==="mort"&&<>
        <div style={{display:"flex",gap:7,marginBottom:12}}>
          <Btn v="red" onClick={()=>{setF({fecha:hoy(),campoId:(db.campos[0]&&db.campos[0].id),causa:"Enfermedad"});setMMort(true);}}>💀 Registrar baja</Btn>
        </div>
        {(()=>{
          const muertes=db.movAnim.filter(m=>m.tipo==="Muerte");
          const totMort={};muertes.forEach(m=>{totMort[m.cat]=(totMort[m.cat]||0)+(parseInt(m.cant)||0);});
          return(<>
            {Object.keys(totMort).length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:10,marginBottom:12}}>
              {Object.entries(totMort).map(([cat,tot])=><GC key={cat} title={cat} val={fmt(tot)} sub="bajas totales" acc={C.ro} emoji="💀"/>)}
            </div>}
            <Tabla heads={["Fecha","Campo","Categoría","Cant.","Causa","Nota",""]}
              rows={muertes.slice().reverse().map(m=><tr key={m.id}>
                <Td>{m.fecha}</Td><Td>{camNom(db,m.campoId)}</Td><Td bold>{m.cat}</Td><Td>{m.cant}</Td>
                <Td>{m.causa||"—"}</Td><Td>{m.nota||"—"}</Td>
                <Td><Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,movAnim:db.movAnim.filter(x=>x.id!==m.id)});}}>🗑️</Btn></Td>
              </tr>)}/>
          </>);
        })()}
      </>}

      {/* MODAL AGREGAR / EDITAR STOCK */}
      <Modal open={mEdit} onClose={()=>{setMEdit(false);setF({});}} title="➕ Agregar / Editar Animales">
        <InfoBox text="Ingresá el número TOTAL actual de esa categoría. Sirve para agregar nuevos animales, corregir un conteo o registrar nacimientos." color="green" emoji="🐄"/>
        <FR>
          <Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/>
          <Inp label="Categoría" value={f.cat||"Vacas"} onChange={v=>sf("cat",v)} opts={CATS}/>
        </FR>
        <Inp label="Cantidad TOTAL actual" type="number" value={f.cant||""} onChange={v=>sf("cant",v)} placeholder="Ej: 31" sx={{marginBottom:10}}/>
        <div style={{background:C.az3,border:"1.5px solid #b8d5f8",borderRadius:13,padding:13,marginBottom:10}}>
          <div style={{fontSize:"0.72rem",fontWeight:800,color:C.az,textTransform:"uppercase",marginBottom:9}}>Desglose opcional (machos/hembras)</div>
          <FR><Inp label="♂ Machos" type="number" value={f.machos||""} onChange={v=>sf("machos",v)}/><Inp label="♀ Hembras" type="number" value={f.hembras||""} onChange={v=>sf("hembras",v)}/></FR>
        </div>
        <Inp label="Nota (opcional)" value={f.nota||""} onChange={v=>sf("nota",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>{setMEdit(false);setF({});}} saveLabel="Guardar stock" onSave={guardarStock}/>
      </Modal>

      {/* MODAL NACIMIENTOS */}
      <Modal open={mNac} onClose={()=>{setMNac(false);setF({});}} title="🍼 Registrar Nacimientos">
        <InfoBox text="Los nacimientos SE SUMAN al stock actual de esa categoría." color="green" emoji="🍼"/>
        <FR>
          <Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/>
          <Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/>
        </FR>
        <FR>
          <Inp label="Categoría que nació" value={f.cat||"Terneros"} onChange={v=>sf("cat",v)} opts={CATS}/>
          <Inp label="Cantidad de nacimientos" type="number" value={f.cant||""} onChange={v=>sf("cant",v)} placeholder="Ej: 5"/>
        </FR>
        <FR>
          <Inp label="♂ Machos" type="number" value={f.machos||""} onChange={v=>sf("machos",v)} placeholder="0"/>
          <Inp label="♀ Hembras" type="number" value={f.hembras||""} onChange={v=>sf("hembras",v)} placeholder="0"/>
        </FR>
        <Inp label="Nota (madre, observaciones...)" value={f.nota||""} onChange={v=>sf("nota",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>{setMNac(false);setF({});}} saveLabel="Registrar nacimientos" sv="teal" onSave={()=>{
          const cant=parseInt(f.cant)||0;
          if(!cant)return alert("Ingresá la cantidad");
          // Sumar al stock existente
          const existing=db.animales.find(a=>a.campoId==f.campoId&&a.cat===f.cat);
          let nuevos;
          if(existing){
            nuevos=db.animales.map(a=>a.campoId==f.campoId&&a.cat===f.cat?{...a,cant:(parseInt(a.cant)||0)+cant,machos:(parseInt(a.machos)||0)+(parseInt(f.machos)||0),hembras:(parseInt(a.hembras)||0)+(parseInt(f.hembras)||0)}:a);
          }else{
            nuevos=[...db.animales,{id:Date.now(),campoId:f.campoId,cat:f.cat,cant,machos:parseInt(f.machos)||0,hembras:parseInt(f.hembras)||0,fecha:f.fecha}];
          }
          const nd=addMov({...db,animales:nuevos,movAnim:[...db.movAnim,{id:Date.now(),...f,tipo:"Nacimiento",cant,modalidad:"—"}]},`🍼 Nacimientos: ${cant} ${f.cat} en ${camNom(db,f.campoId)}`);
          setDb(nd);setMNac(false);setF({});
        }}/>
      </Modal>

      {/* MODAL COMPRA / VENTA */}
      <Modal open={mMov} onClose={()=>{setMov(false);setF({});}} title={f.tipo==="Venta"?"🤝 Registrar Venta":"🐄 Registrar Compra"}>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:12}}>
          <button onClick={()=>sf("tipo","Compra")} style={{padding:"13px",borderRadius:13,border:`2px solid ${f.tipo!=="Venta"?C.v:"#e2e8f0"}`,background:f.tipo!=="Venta"?C.v3:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:800,color:f.tipo!=="Venta"?C.v:C.md,fontSize:"0.9rem"}}>🐄 Compra</button>
          <button onClick={()=>sf("tipo","Venta")} style={{padding:"13px",borderRadius:13,border:`2px solid ${f.tipo==="Venta"?C.ro:"#e2e8f0"}`,background:f.tipo==="Venta"?C.ro3:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:800,color:f.tipo==="Venta"?C.ro:C.md,fontSize:"0.9rem"}}>💰 Venta</button>
        </div>
        <FR><Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/><Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/></FR>
        <FR><Inp label="Categoría" value={f.cat||"Vacas"} onChange={v=>sf("cat",v)} opts={CATS}/><Inp label="Cantidad" type="number" value={f.cant||""} onChange={v=>sf("cant",v)}/></FR>
        <FR><Inp label="Precio/cabeza ($)" type="number" value={f.precio||""} onChange={v=>sf("precio",v)}/><Inp label="Peso prom.(kg)" type="number" value={f.peso||""} onChange={v=>sf("peso",v)}/></FR>
        <div style={{background:C.bg,borderRadius:13,padding:13,marginBottom:10}}>
          <div style={{fontSize:"0.72rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:9}}>💼 Modalidad</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <button onClick={()=>sf("modalidad","Blanco")} style={{padding:"11px",borderRadius:12,border:`2px solid ${f.modalidad!=="Negro"?C.v:"#e2e8f0"}`,background:f.modalidad!=="Negro"?C.v3:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:800,color:f.modalidad!=="Negro"?C.v:C.md,fontSize:"0.85rem",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>✅ En blanco</button>
            <button onClick={()=>sf("modalidad","Negro")} style={{padding:"11px",borderRadius:12,border:`2px solid ${f.modalidad==="Negro"?C.dk:"#e2e8f0"}`,background:f.modalidad==="Negro"?"#2a2a2a":"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:800,color:f.modalidad==="Negro"?"#fff":C.md,fontSize:"0.85rem",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>🤝 En negro</button>
          </div>
        </div>
        <Inp label="Nota" value={f.nota||""} onChange={v=>sf("nota",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>{setMov(false);setF({});}} saveLabel={f.tipo==="Venta"?"Registrar venta":"Registrar compra"} sv={f.tipo==="Venta"?"orange":"green"} onSave={()=>{
          const cant=parseInt(f.cant)||0;
          const nd=addMov({...db,movAnim:[...db.movAnim,{id:Date.now(),...f,cant,modalidad:f.modalidad||"Blanco"}]},`${f.tipo==="Venta"?"💰 Venta":"🐄 Compra"}: ${cant} ${f.cat}`);
          setDb(nd);setMov(false);setF({});
        }}/>
      </Modal>

      {/* MODAL TRASLADO */}
      <Modal open={mTrasl} onClose={()=>{setMTrasl(false);setF({});}} title="↔️ Traslado entre campos">
        <FR><Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/><Inp label="Categoría" value={f.cat||"Vacas"} onChange={v=>sf("cat",v)} opts={CATS}/></FR>
        <FR><Inp label="Cantidad a trasladar" type="number" value={f.cant||""} onChange={v=>sf("cant",v)}/></FR>
        <div style={{background:C.az3,border:"1.5px solid #b8d5f8",borderRadius:13,padding:13,marginBottom:10}}>
          <FR><Inp label="Campo origen" value={f.campoOrigen||""} onChange={v=>sf("campoOrigen",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/><Inp label="Campo destino" value={f.campoDestino||""} onChange={v=>sf("campoDestino",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/></FR>
        </div>
        <Inp label="Nota" value={f.nota||""} onChange={v=>sf("nota",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>{setMTrasl(false);setF({});}} saveLabel="Registrar traslado" sv="blue" onSave={()=>{
          const cant=parseInt(f.cant)||0;
          if(!cant)return alert("Ingresá la cantidad");
          const nd=addMov({...db,movAnim:[...db.movAnim,{id:Date.now(),...f,tipo:"Traslado",cant,campoId:f.campoOrigen}]},`↔️ Traslado: ${cant} ${f.cat}`);
          setDb(nd);setMTrasl(false);setF({});
        }}/>
      </Modal>

      {/* MODAL MORTALIDAD */}
      <Modal open={mMort} onClose={()=>{setMMort(false);setF({});}} title="💀 Registrar Baja">
        <FR><Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/><Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/></FR>
        <FR><Inp label="Categoría" value={f.cat||"Vacas"} onChange={v=>sf("cat",v)} opts={CATS}/><Inp label="Cantidad" type="number" value={f.cant||""} onChange={v=>sf("cant",v)}/></FR>
        <Inp label="Causa" value={f.causa||"Enfermedad"} onChange={v=>sf("causa",v)} opts={["Enfermedad","Accidente","Parto","Predador","Causa desconocida","Otro"]} sx={{marginBottom:9}}/>
        <Inp label="Descripción / Nota" value={f.nota||""} onChange={v=>sf("nota",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>{setMMort(false);setF({});}} sv="red" saveLabel="Registrar baja" onSave={()=>{
          const cant=parseInt(f.cant)||0;
          const nd=addMov({...db,movAnim:[...db.movAnim,{id:Date.now(),...f,tipo:"Muerte",cant,modalidad:"—"}]},`💀 Baja: ${cant} ${f.cat}`);
          setDb(nd);setMMort(false);setF({});
        }}/>
      </Modal>
    </div>
  );
}

// ── SILOBOLSAS ────────────────────────────────────────────
function SecSilos({db,setDb}){
  const [tab,setTab]=useState("disponibles");
  const [mS,setMS]=useState(false);const [mSal,setMSal]=useState(false);const [siloSel,setSiloSel]=useState(null);
  const [busqueda,setBusqueda]=useState("");
  const [f,setF]=useState({});const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const eb={"Activa":"green","Abierta parcial":"yellow","Vaciada":"gray"};

  // Silos disponibles (con kg > 0)
  const activos=db.silos.filter(s=>s.estado!=="Vaciada"&&(s.kgRest||0)>0);
  const vaciadas=db.silos.filter(s=>s.estado==="Vaciada"||(s.kgRest||0)<=0);

  // Stock total por cereal (solo disponibles)
  const stockTotal={};
  activos.forEach(s=>{stockTotal[s.cereal]=(stockTotal[s.cereal]||0)+(s.kgRest||0);});

  // Filtro búsqueda
  const bq=busqueda.toLowerCase().trim();
  const silosFilt=(tab==="disponibles"?activos:tab==="historial"?db.silos:activos).filter(s=>{
    if(!bq)return true;
    return s.num.toString().toLowerCase().includes(bq)||s.cereal.toLowerCase().includes(bq)||camNom(db,s.campoId).toLowerCase().includes(bq)||s.lote.toLowerCase().includes(bq);
  });

  const abrirSalida=(silo)=>{setSiloSel(silo);setF({fecha:hoy(),siloId:silo.id,dest:"Acopio"});setMSal(true);};

  return(
    <div>
      <Tabs items={[{id:"disponibles",label:"📦 Disponibles"},{id:"historial",label:"📋 Historial"},{id:"salidas",label:"🚛 Salidas"}]} active={tab} onChange={setTab}/>

      {tab==="disponibles"&&<>
        <div style={{display:"flex",gap:7,marginBottom:12}}>
          <Btn onClick={()=>{setF({cereal:"Soja",estado:"Activa",fecha:hoy(),campoId:(db.campos[0]&&db.campos[0].id)});setMS(true);}}>+ Silobolsa</Btn>
        </div>

        {/* STOCK TOTAL POR CEREAL */}
        {Object.keys(stockTotal).length>0&&<Panel title="📊 Stock total disponible" accent={C.v}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:9}}>
            {Object.entries(stockTotal).sort((a,b)=>b[1]-a[1]).map(([cer,kg],i)=>(
              <div key={cer} style={{background:C.v3,borderRadius:12,padding:"10px 12px",textAlign:"center",border:"1.5px solid #b8f0d8"}}>
                <div style={{fontSize:"0.68rem",fontWeight:800,textTransform:"uppercase",color:C.md}}>{cer}</div>
                <div style={{fontSize:"1.2rem",fontWeight:900,color:C.v,margin:"3px 0"}}>{fmt(kg)} kg</div>
                <div style={{fontSize:"0.68rem",color:C.lt}}>{(kg/1000).toFixed(1)} t</div>
              </div>
            ))}
          </div>
          <div style={{marginTop:10,paddingTop:10,borderTop:"1px solid #f0f4f8",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <span style={{fontSize:"0.78rem",fontWeight:700,color:C.md}}>Total en bolsas:</span>
            <span style={{fontSize:"1.1rem",fontWeight:900,color:C.dk}}>{fmt(Object.values(stockTotal).reduce((s,v)=>s+v,0))} kg</span>
          </div>
        </Panel>}

        <Buscador value={busqueda} onChange={setBusqueda} placeholder="🔍 Buscar por campo, lote, número o cereal..."/>
        {busqueda&&<div style={{fontSize:"0.78rem",color:C.v,fontWeight:700,marginBottom:8}}>{silosFilt.length} resultado{silosFilt.length!==1?"s":""}</div>}

        {/* BOLSAS AGRUPADAS POR CEREAL */}
        {!activos.length
          ?<div style={{textAlign:"center",padding:30,color:C.lt}}><div style={{fontSize:"2.5rem"}}>🛍️</div><p>Sin silobolsas disponibles</p></div>
          :silosFilt.length===0
          ?<div style={{textAlign:"center",padding:20,color:C.lt}}>Sin resultados para "{busqueda}"</div>
          :(()=>{
            const porCereal={};
            silosFilt.forEach(s=>{if(!porCereal[s.cereal])porCereal[s.cereal]=[];porCereal[s.cereal].push(s);});
            return Object.entries(porCereal).map(([cer,silos])=>(
              <Panel key={cer} title={`🌾 ${cer} — ${fmt(silos.reduce((s,x)=>s+(x.kgRest||0),0))} kg disponibles`} accent={ACCS[CERALES.indexOf(cer)%7]||C.v}>
                {silos.map(s=>{
                  const pct=s.kg>0?Math.round((s.kgRest/s.kg)*100):0;
                  const salEsta=db.salidasSilo.filter(x=>x.siloId==s.id);
                  const totSal=salEsta.reduce((sum,x)=>sum+x.kg,0);
                  return(
                    <div key={s.id} style={{background:C.bg,borderRadius:12,padding:"11px 13px",marginBottom:8}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                        <div>
                          <div style={{fontWeight:900,fontSize:"0.92rem"}}>🛍️ Bolsa {s.num||"S/N"} <Bdg label={s.estado} col={eb[s.estado]||"gray"}/></div>
                          <div style={{fontSize:"0.72rem",color:C.md,marginTop:2}}>{camNom(db,s.campoId)} · Lote {s.lote||"—"} · {s.fecha||"—"}{s.campania?` · Camp. ${s.campania}`:""}</div>
                        </div>
                        <div style={{display:"flex",gap:4}}>
                          <Btn sz="xs" v="orange" onClick={()=>abrirSalida(s)}>🚛 Sacar</Btn>
                          <Btn sz="xs" v="ghost" onClick={()=>{setF({...s});setMS(true);}}>✏️</Btn>
                          <Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,silos:db.silos.filter(x=>x.id!==s.id)});}}>🗑️</Btn>
                        </div>
                      </div>
                      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:7,marginBottom:6}}>
                        <div style={{background:"#fff",borderRadius:9,padding:"7px",textAlign:"center"}}>
                          <div style={{fontSize:"0.62rem",color:C.md,fontWeight:700,textTransform:"uppercase"}}>Inicial</div>
                          <div style={{fontSize:"0.95rem",fontWeight:900,color:C.dk}}>{fmt(s.kg)}</div>
                        </div>
                        <div style={{background:"#fff",borderRadius:9,padding:"7px",textAlign:"center"}}>
                          <div style={{fontSize:"0.62rem",color:C.md,fontWeight:700,textTransform:"uppercase"}}>Salieron</div>
                          <div style={{fontSize:"0.95rem",fontWeight:900,color:C.ro}}>{fmt(totSal)}</div>
                        </div>
                        <div style={{background:C.v3,borderRadius:9,padding:"7px",textAlign:"center"}}>
                          <div style={{fontSize:"0.62rem",color:C.md,fontWeight:700,textTransform:"uppercase"}}>Quedan</div>
                          <div style={{fontSize:"0.95rem",fontWeight:900,color:C.v}}>{fmt(s.kgRest)}</div>
                        </div>
                      </div>
                      <ProgBar pct={pct}/>
                      <div style={{fontSize:"0.68rem",color:C.md,textAlign:"right",marginTop:2}}>{pct}% restante{s.hum?` · Hum: ${s.hum}%`:""}</div>
                    </div>
                  );
                })}
              </Panel>
            ));
          })()}
      </>}

      {tab==="historial"&&<>
        <Buscador value={busqueda} onChange={setBusqueda} placeholder="🔍 Buscar bolsa, campo, lote o cereal..."/>
        <Tabla heads={["Nº","Campo","Lote","Cereal","Campaña","Kg inicial","Kg restantes","Hum%","Estado",""]}
          rows={db.silos.slice().reverse().filter(s=>{
            if(!bq)return true;
            return s.num.toString().includes(bq)||s.cereal.toLowerCase().includes(bq)||camNom(db,s.campoId).toLowerCase().includes(bq)||s.lote.toLowerCase().includes(bq);
          }).map(s=><tr key={s.id}>
            <Td bold>{s.num||"—"}</Td><Td>{camNom(db,s.campoId)}</Td><Td>{s.lote||"—"}</Td><Td>{s.cereal}</Td><Td>{s.campania||"—"}</Td>
            <Td>{fmt(s.kg)}</Td><Td bold>{fmt(s.kgRest)}</Td><Td>{s.hum||"—"}%</Td>
            <Td><Bdg label={s.estado} col={eb[s.estado]||"gray"}/></Td>
            <Td><Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,silos:db.silos.filter(x=>x.id!==s.id)});}}>🗑️</Btn></Td>
          </tr>)}/>
      </>}

      {tab==="salidas"&&<>
        <Buscador value={busqueda} onChange={setBusqueda} placeholder="🔍 Buscar por cereal, camión o destino..."/>
        <Tabla heads={["Fecha","Bolsa","Cereal","Kg","Camión","Chofer","Destino"]}
          rows={db.salidasSilo.slice().reverse().filter(s=>{
            if(!bq)return true;
            return s.cereal.toLowerCase().includes(bq)||s.camionNom.toLowerCase().includes(bq)||s.dest.toLowerCase().includes(bq);
          }).map(s=><tr key={s.id}>
            <Td>{s.fecha}</Td><Td bold>{s.siloNum||"—"}</Td><Td>{s.cereal}</Td><Td bold>{fmt(s.kg)}</Td>
            <Td>{s.camionNom||s.patente||"—"}</Td><Td>{s.chofer||"—"}</Td><Td>{s.dest}</Td>
          </tr>)}/>
      </>}

      {/* MODAL NUEVA/EDITAR SILO */}
      <Modal open={mS} onClose={()=>{setMS(false);setF({});}} title={f.id?"✏️ Editar Silobolsa":"🛍️ Nueva Silobolsa"}>
        <FR><Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/><Inp label="Lote" value={f.lote||""} onChange={v=>sf("lote",v)}/></FR>
        <FR><Inp label="Cereal" value={f.cereal||"Soja"} onChange={v=>sf("cereal",v)} opts={CERALES}/><Inp label="Nº Silobolsa" value={f.num||""} onChange={v=>sf("num",v)}/></FR>
        <FR><Inp label="Kg embolsados" type="number" value={f.kg||""} onChange={v=>sf("kg",v)}/><Inp label="Humedad %" type="number" value={f.hum||""} onChange={v=>sf("hum",v)}/></FR>
        <FR><Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/><Inp label="Campaña" value={f.campania||CAMPANIAS[3]} onChange={v=>sf("campania",v)} opts={CAMPANIAS}/></FR>
        <Inp label="Estado" value={f.estado||"Activa"} onChange={v=>sf("estado",v)} opts={["Activa","Abierta parcial","Vaciada"]} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>{setMS(false);setF({});}} onSave={()=>{
          const kg=parseFloat(f.kg)||0;
          const nd=f.id
            ?addMov({...db,silos:db.silos.map(x=>x.id===f.id?{...f}:x)},`✏️ Silo editado: ${f.num}`)
            :addMov({...db,silos:[...db.silos,{id:Date.now(),...f,kg,kgRest:kg}]},`🛍️ Silo ${f.num}: ${f.cereal} ${fmt(kg)}kg`);
          setDb(nd);setMS(false);setF({});
        }}/>
      </Modal>

      {/* MODAL SALIDA */}
      <Modal open={mSal} onClose={()=>{setMSal(false);setSiloSel(null);}} title="🚛 Registrar Salida de Cereal">
        {siloSel&&<InfoBox text={`📦 Bolsa ${siloSel.num||"S/N"} — ${siloSel.cereal} — Disponible: ${fmt(siloSel.kgRest)} kg`} color="green" emoji=""/>}
        <FR><Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/><Inp label="Kg a retirar" type="number" value={f.kg||""} onChange={v=>sf("kg",v)}/></FR>
        <FR><Inp label="Destino" value={f.dest||"Acopio"} onChange={v=>sf("dest",v)} opts={["Acopio","Campoamor","Cooperativa","Venta directa","Puerto","Consumo propio","Otro"]}/></FR>
        <div style={{background:C.az3,border:"1.5px solid #b8d5f8",borderRadius:13,padding:13,marginBottom:10}}>
          <div style={{fontSize:"0.72rem",fontWeight:800,color:C.az,textTransform:"uppercase",marginBottom:9}}>🚛 Camión</div>
          <Inp label="Camión" value={f.camionId||""} onChange={v=>{sf("camionId",v);const cam=db.camiones.find(c=>c.id==v);if(cam){sf("camionNom",cam.nom);sf("patente",cam.pat||"");}}} opts={[{v:"",l:"-- Seleccionar --"},...db.camiones.map(c=>({v:c.id,l:c.nom})),{v:"otro",l:"Otro..."}]} sx={{marginBottom:9}}/>
          {f.camionId==="otro"&&<Inp label="Nombre/Patente" value={f.camionNom||""} onChange={v=>sf("camionNom",v)} sx={{marginBottom:9}}/>}
          <FR><Inp label="Chofer" value={f.chofer||""} onChange={v=>sf("chofer",v)}/><Inp label="Carta de porte" value={f.carta||""} onChange={v=>sf("carta",v)}/></FR>
        </div>
        <MBtns onClose={()=>{setMSal(false);setSiloSel(null);}} saveLabel="Registrar salida" sv="orange" onSave={()=>{
          const silo=db.silos.find(s=>s.id==f.siloId||s.id==(siloSel&&siloSel.id));const kg=parseFloat(f.kg)||0;
          if(!silo)return alert("Error: no se encontró la silobolsa");
          if(kg>(silo.kgRest||0))return alert(`Solo quedan ${fmt(silo.kgRest)} kg`);
          const ns=db.silos.map(s=>s.id==silo.id?{...s,kgRest:Math.max(0,(s.kgRest||0)-kg),estado:(s.kgRest||0)-kg<=0?"Vaciada":(s.kgRest||0)-kg<s.kg?"Abierta parcial":s.estado}:s);
          const camNomSal=f.camionId&&f.camionId!=="otro"?((db.camiones.find(c=>c.id==f.camionId)||{nom:f.camionNom}).nom):f.camionNom;
          const nd=addMov({...db,silos:ns,salidasSilo:[...db.salidasSilo,{id:Date.now(),...f,siloId:silo.id,kg,siloNum:silo.num,cereal:silo.cereal,camionNom:camNomSal}]},`🚛 ${fmt(kg)}kg ${silo.cereal} – ${camNomSal||"camión"}`);
          setDb(nd);setMSal(false);setSiloSel(null);setF({});
        }}/>
      </Modal>
    </div>
  );
}

// ── INSUMOS ───────────────────────────────────────────────
function SecInsumos({db,setDb}){
  const [tab,setTab]=useState("stock");

          </div>
        </Panel>
        {cults.map(cult=>{
          const hC=db.lotes.filter(l=>l.cultivo==cult&&l.anio==py).reduce((s,l)=>s+(parseFloat(l.ha)||0),0);

        {(()=>{

                  {Object.entries(totPorTipo).sort((a,b)=>b[1]-a[1]).map(([tipo,total],i)=>(

        <Tabla heads={["Fecha","Insumo","Tipo","Cantidad","Und","$/und","Total","Proveedor","Lugar","Campaña",""]}
          rows={(db.comprasIns||[]).slice().reverse().map(c=>(
            <tr key={c.id}>
              <Td>{c.fecha}</Td><Td bold>{c.nom}</Td><Td><Bdg label={c.tipo} col={tb[c.tipo]||"gray"}/></Td>
              <Td>{c.qty}</Td><Td>{c.und}</Td><Td>${fmt(c.precio)}</Td>
              <Td bold>${fmt(parseFloat(c.precio||0)*parseFloat(c.qty||0))}</Td>
              <Td>{c.proveedor||"—"}</Td><Td>{c.lugar||"—"}</Td><Td>{c.anio||"—"}</Td>
              <Td><Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,comprasIns:(db.comprasIns||[]).filter(x=>x.id!==c.id)});}}>🗑️</Btn></Td>
            </tr>
          ))}/>
      </>}
      {tab==="promedios"&&<>
        <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:12,flexWrap:"wrap"}}>
          <span style={{fontSize:"0.75rem",fontWeight:800,color:C.md}}>Campaña:</span>
          {db.years.map(y=><button key={y} onClick={()=>setPy(y)} style={{padding:"6px 14px",borderRadius:30,border:`1.5px solid ${y===py?C.az:"#e2e8f0"}`,background:y===py?C.az:"#fff",color:y===py?"#fff":C.md,fontSize:"0.76rem",fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>{y}/{parseInt(y)+1}</button>)}
        </div>
        {renderProm()}
      </>}
      <Modal open={mI} onClose={()=>{setMI(false);setF({});}} title={f.id?"✏️ Editar Insumo":"📦 Nuevo Insumo"}>
        <FR><Inp label="Nombre" value={f.nom||""} onChange={v=>sf("nom",v)} placeholder="Ej: Glifosato 48%"/><Inp label="Tipo" value={f.tipo||"Herbicida"} onChange={v=>sf("tipo",v)} opts={TINSUMO}/></FR>
        <FR><Inp label="Cantidad" type="number" value={f.qty||""} onChange={v=>sf("qty",v)}/><Inp label="Unidad" value={f.und||"Litros"} onChange={v=>sf("und",v)} opts={UNIDADES}/></FR>
        <FR><Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/><Inp label="Campaña" value={f.anio||""} onChange={v=>sf("anio",v)} opts={db.years}/></FR>
        <FR><Inp label="Proveedor" value={f.prov||""} onChange={v=>sf("prov",v)}/><Inp label="Precio por unidad($)" type="number" value={f.precio||""} onChange={v=>sf("precio",v)}/></FR>

        <MBtns onClose={()=>setMCo(false)} sv="teal" saveLabel="Registrar compra" onSave={()=>{

      <Modal open={mR} onClose={()=>setMR(false)} title="📤 Retiro de Insumo">
        <FR><Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/><Inp label="Insumo" value={f.insId||""} onChange={v=>sf("insId",v)} opts={db.insumos.map(i=>({v:i.id,l:`${i.nom} (${i.qty} ${i.und})`}))}/></FR>
        {f.insId&&(()=>{const ins=db.insumos.find(i=>i.id==f.insId);return ins?<InfoBox text={`Stock actual: ${ins.qty} ${ins.und}`} color="blue" emoji="📦"/>:null;})()}
        <FR><Inp label="Cantidad" type="number" value={f.qty||""} onChange={v=>sf("qty",v)}/><Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/></FR>
        <FR><Inp label="Lote" value={f.lote||""} onChange={v=>sf("lote",v)}/><Inp label="Cultivo destino" value={f.cultivo||""} onChange={v=>sf("cultivo",v)} placeholder="Soja, Trigo..."/></FR>
        <FR><Inp label="Campaña" value={f.anio||""} onChange={v=>sf("anio",v)} opts={db.years}/><Inp label="Retirado por" value={f.quien||""} onChange={v=>sf("quien",v)}/></FR>
        <Inp label="Uso / Aplicación" value={f.uso||""} onChange={v=>sf("uso",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>setMR(false)} saveLabel="Registrar" sv="orange" onSave={()=>{
          const ins=db.insumos.find(i=>i.id==f.insId);const qty=parseFloat(f.qty)||0;
          const cf=db.campos.find(c=>c.id==f.campoId);
          const ni=db.insumos.map(i=>i.id==f.insId?{...i,qty:Math.max(0,i.qty-qty)}:i);
          const nd=addMov({...db,insumos:ni,retiros:[...db.retiros,{id:Date.now(),...f,qty,insNom:ins?ins.nom:"?",und:ins?ins.und:"",tipo:ins?ins.tipo:"",campoNom:cf?cf.nombre:""}]},`📤 ${qty}${ins?ins.und:""} ${ins?ins.nom:""} → ${f.lote||""}`);
          setDb(nd);setMR(false);setF({});
        }}/>
      </Modal>
    </div>
  );
}

// ── GASTOS ────────────────────────────────────────────────
function SecGastos({db,setDb}){
  const [filtro,setFiltro]=useState("todos");
  const [busqGasto,setBusqGasto]=useState("");
  const [mG,setMG]=useState(false);const [mF,setMF]=useState(false);
  const [f,setF]=useState({});const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const cb={"Ferretería":"yellow","Veterinaria":"blue","Repuestos":"orange","Combustible":"green","Mano de obra":"purple","Arrendamiento":"brown","Seguros":"teal"};
  const listaBase=filtro==="todos"?db.gastos:filtro==="otros"?db.gastos.filter(g=>!["Ferretería","Veterinaria","Repuestos","Combustible","Mercadería"].includes(g.cat)):db.gastos.filter(g=>g.cat===filtro);
  const lista=busqGasto?listaBase.filter(g=>g.concepto.toLowerCase().includes(busqGasto.toLowerCase())||g.prov.toLowerCase().includes(busqGasto.toLowerCase())||g.cat.toLowerCase().includes(busqGasto.toLowerCase())):listaBase;
  const total=lista.reduce((s,g)=>s+g.monto,0);

  // Gasto por máquina (repuestos)
  const gastoPorMaquina={};
  db.gastos.filter(g=>g.cat==="Repuestos"&&g.maquinaId).forEach(g=>{
    const mq=db.maquinas.find(m=>m.id==g.maquinaId);
    const nom=mq?mq.nom:(g.maquinaNom||"Sin asignar");
    if(!gastoPorMaquina[nom])gastoPorMaquina[nom]=0;
    gastoPorMaquina[nom]+=g.monto;
  });

  const onDatos=d=>{setF({fecha:d.fecha||hoy(),cat:d.categoria||"Ferretería",concepto:d.concepto||"",prov:d.proveedor||"",monto:d.monto||"",fact:d.factura||"",items:d.items||"",campoId:(db.campos[0]&&db.campos[0].id)||"",_ia:true});setMG(true);};

  return(
    <div>
      <Tabs items={[{id:"todos",label:"📋 Todos"},{id:"Ferretería",label:"🔧 Ferr."},{id:"Veterinaria",label:"💉 Vet."},{id:"Repuestos",label:"⚙️ Rep."},{id:"Mercadería",label:"🛒 Merc."},{id:"otros",label:"📌 Otros"}]} active={filtro} onChange={setFiltro}/>
      <Buscador value={filtro==="buscar"?busqGasto:""} onChange={v=>{setBusqGasto(v);}} placeholder="🔍 Buscar por concepto, proveedor o categoría..."/>
      <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap"}}>
        <Btn onClick={()=>{setF({fecha:hoy(),cat:"Ferretería",campoId:(db.campos[0]&&db.campos[0].id)||""});setMG(true);}}>+ Gasto</Btn>
        <button onClick={()=>setMF(true)} style={{background:`linear-gradient(135deg,${C.na},${C.na2})`,color:"#fff",border:"none",borderRadius:12,padding:"10px 16px",fontSize:"0.82rem",fontWeight:800,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:6}}>📷 Foto de remito</button>
      </div>

      {filtro==="Repuestos"&&Object.keys(gastoPorMaquina).length>0&&(
        <Panel title="⚙️ Gasto en repuestos por máquina" accent={C.na}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(150px,1fr))",gap:9,marginBottom:4}}>
            {Object.entries(gastoPorMaquina).sort((a,b)=>b[1]-a[1]).map(([nom,monto],i)=><GC key={nom} title={nom} val={"$"+fmt(monto)} sub="en repuestos" acc={ACCS[i%7]} emoji="⚙️"/>)}
          </div>
        </Panel>
      )}

      {lista.length>0&&<Panel accent={C.ro}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{fontSize:"0.74rem",fontWeight:800,color:C.md,textTransform:"uppercase"}}>Total {filtro!=="todos"?filtro:""}</span><span style={{fontSize:"1.35rem",fontWeight:900,color:C.dk}}>${fmt(total)}</span></div></Panel>}
      <Tabla heads={["Fecha","Categoría","Concepto","Proveedor","Máquina","Monto","Campo",""]}
        rows={lista.slice().reverse().map(g=><tr key={g.id}>
          <Td>{g.fecha}</Td><Td><Bdg label={g.cat} col={cb[g.cat]||"gray"}/></Td>
          <Td bold>{g.concepto}{g.items&&<div style={{fontSize:"0.69rem",color:C.md,marginTop:2}}>📋 {g.items}</div>}</Td>
          <Td>{g.prov||"—"}</Td><Td>{g.maquinaNom||"—"}</Td><Td bold>${fmt(g.monto)}</Td><Td>{camNom(db,g.campoId)}</Td>
          <Td><div style={{display:"flex",gap:4}}><Btn sz="xs" v="ghost" onClick={()=>{setF({...g,_ia:false});setMG(true);}}>✏️</Btn><Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,gastos:db.gastos.filter(x=>x.id!==g.id)});}}>🗑️</Btn></div></Td>
        </tr>)}/>
      <FotoModal open={mF} onClose={()=>setMF(false)} onDatos={onDatos}/>
      <Modal open={mG} onClose={()=>{setMG(false);setF({});}} title={f.id?"✏️ Editar Gasto":"💰 Registrar Gasto"}>
        {f._ia&&<InfoBox text="Remito leído con IA — revisá y ajustá si es necesario" color="green" emoji="✨"/>}
        <FR><Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/><Inp label="Categoría" value={f.cat||"Ferretería"} onChange={v=>sf("cat",v)} opts={CATGAS}/></FR>
        <FR><Inp label="Concepto" value={f.concepto||""} onChange={v=>sf("concepto",v)}/><Inp label="Proveedor" value={f.prov||""} onChange={v=>sf("prov",v)}/></FR>
        {f.items&&<Inp label="Productos del remito" value={f.items||""} onChange={v=>sf("items",v)} sx={{marginBottom:10}}/>}
        <FR><Inp label="Monto ($)" type="number" value={f.monto||""} onChange={v=>sf("monto",v)}/><Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/></FR>
        {f.cat==="Repuestos"&&(
          <div style={{background:C.na3,border:"1.5px solid #f8d8b0",borderRadius:13,padding:13,marginBottom:10}}>
            <div style={{fontSize:"0.72rem",fontWeight:800,color:C.na,textTransform:"uppercase",marginBottom:9}}>⚙️ ¿Para qué máquina?</div>
            <FR>
              <Inp label="Máquina" value={f.maquinaId||""} onChange={v=>{sf("maquinaId",v);const mq=db.maquinas.find(m=>m.id==v);if(mq)sf("maquinaNom",mq.nom);}} opts={[{v:"",l:"-- Seleccionar --"},...db.maquinas.map(m=>({v:m.id,l:m.nom})),{v:"otra",l:"Otra máquina..."}]}/>
              {f.maquinaId==="otra"&&<Inp label="Nombre máquina" value={f.maquinaNom||""} onChange={v=>sf("maquinaNom",v)}/>}
            </FR>
          </div>
        )}
        <FR><Inp label="Nº Factura / Remito" value={f.fact||""} onChange={v=>sf("fact",v)}/><Inp label="Campaña" value={f.campania||""} onChange={v=>sf("campania",v)} opts={[{v:"",l:"Sin campaña"},...CAMPANIAS]}/></FR>
        <MBtns onClose={()=>{setMG(false);setF({});}} onSave={()=>{const nd=f.id?addMov({...db,gastos:db.gastos.map(x=>x.id===f.id?{...f,monto:parseFloat(f.monto)||0}:x)},`✏️ Gasto editado: ${f.concepto}`):addMov({...db,gastos:[...db.gastos,{id:Date.now(),...f,monto:parseFloat(f.monto)||0}]},`💰 ${f.cat}: ${f.concepto} $${fmt(f.monto)}`);setDb(nd);setMG(false);setF({});}}/>
      </Modal>
    </div>
  );
}

// ── COSECHA ───────────────────────────────────────────────
function SecCosecha({db,setDb}){
  const [tab,setTab]=useState("cosechas");
  const [mC,setMC]=useState(false);
  const [mCam,setMCam]=useState(false);
  const [cosechaSel,setCosechaSel]=useState(null);
  const [editCos,setEditCos]=useState(null); // cosecha en edición
  const [f,setF]=useState({});const sf=(k,v)=>setF(p=>({...p,[k]:v}));

  const totGen={};
  db.cosechas.forEach(c=>{
    const kgCams=db.cosechaCamiones.filter(x=>x.cosechaId==c.id).reduce((s,x)=>s+x.kg,0);
    const kgSilos=(c.silobolsas&&c.silobolsas.length>0?(c.silobolsas||[]).reduce((s,sb)=>s+(parseFloat(sb.kg)||0),0):(parseFloat(c.kgSilo)||0));
    totGen[c.cereal]=(totGen[c.cereal]||0)+kgSilos+kgCams;
  });

  const abrirCam=(cos)=>{setCosechaSel(cos);setF({fecha:hoy(),cosechaId:cos.id,dest:"Acopio",modalidad:"Blanco"});setMCam(true);};

  const abrirEditar=(cos)=>{
    setEditCos(cos);
    setF({...cos, silobolsas: cos.silobolsas||[]});
    setMC(true);
  };

  const guardarCosecha=()=>{
    const loteReal=f.lote==="__otro"?(f.loteManual||""):f.lote;
    const br=parseFloat(f.brutos)||0, dc=parseFloat(f.desc)||0;
    const netos=br-dc;
    const silosForm=f.silobolsas||[];
    const kgSiloTotal=silosForm.reduce((s,sb)=>s+(parseFloat(sb.kg)||0),0);

    let newDb;
    const cosId=editCos?editCos.id:Date.now();

    // Actualizar cosecha
    if(editCos){
      newDb={...db,cosechas:db.cosechas.map(c=>c.id===editCos.id?{...c,...f,lote:loteReal,brutos:br,desc:dc,netos,kgSilo:kgSiloTotal,silobolsas:silosForm}:c)};
      // Eliminar silos viejos de esta cosecha y recrear con los nuevos datos
      const silosSinEsta=newDb.silos.filter(s=>s.origenCosechaId!==editCos.id);
      const silosEditados=silosForm.filter(sb=>sb.num&&sb.kg).map((sb,i)=>({
        id:editCos.id*100+i+1,
        campoId:f.campoId, lote:loteReal, cereal:f.cereal,
        num:sb.num, kg:parseFloat(sb.kg)||0, kgRest:parseFloat(sb.kg)||0,
        hum:f.hum||"", humMax:f.humMax||"",
        fecha:f.fecha||hoy(), campania:f.campania||"",
        estado:"Activa", origenCosechaId:editCos.id
      }));
      newDb={...newDb,silos:[...silosSinEsta,...silosEditados]};
      newDb=addMov(newDb,`✏️ Cosecha editada: ${f.cereal} ${camNom(db,f.campoId)}`);
    }else{
      // Nueva cosecha
      newDb={...db,cosechas:[...db.cosechas,{id:cosId,...f,lote:loteReal,brutos:br,desc:dc,netos,kgSilo:kgSiloTotal,silobolsas:silosForm}]};
      // Crear silobolsas automáticamente en Silos
      if(silosForm.length>0){
        const nuevosSilos=silosForm.filter(sb=>sb.num&&sb.kg).map((sb,i)=>({
          id:cosId*100+i+1,
          campoId:f.campoId, lote:loteReal, cereal:f.cereal,
          num:sb.num, kg:parseFloat(sb.kg)||0, kgRest:parseFloat(sb.kg)||0,
          hum:f.hum||"", humMax:f.humMax||"",
          fecha:f.fecha||hoy(), campania:f.campania||"",
          estado:"Activa", origenCosechaId:cosId
        }));
        newDb={...newDb,silos:[...newDb.silos,...nuevosSilos]};
      }
      newDb=addMov(newDb,`🌽 ${f.cereal} ${fmt(netos)}kg netos – ${camNom(db,f.campoId)}`);
    }
    setDb(newDb);setMC(false);setEditCos(null);setF({});
  };

  return(
    <div>
      <Tabs items={[{id:"cosechas",label:"🌽 Cosechas"},{id:"camiones",label:"🚛 Camiones"}]} active={tab} onChange={setTab}/>

      {tab==="cosechas"&&<div>
        <div style={{display:"flex",gap:7,marginBottom:12}}>
          <Btn onClick={()=>{setEditCos(null);setF({cereal:"Soja",fecha:hoy(),campoId:db.campos[0]?db.campos[0].id:"",silobolsas:[]});setMC(true);}}>+ Registrar cosecha</Btn>
        </div>

        {Object.keys(totGen).length>0&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:10,marginBottom:12}}>
          {Object.entries(totGen).map(([cer,kg],i)=><GC key={cer} title={cer} val={fmt(kg)+" kg"} sub={(kg/1000).toFixed(1)+" t"} acc={ACCS[i%7]} emoji="🌽"/>)}
        </div>}

        {!db.cosechas.length
          ?<div style={{textAlign:"center",padding:30,color:C.lt}}><div style={{fontSize:"2.5rem"}}>🌽</div><p>Sin cosechas registradas</p></div>
          :db.cosechas.slice().reverse().map(cos=>{
            const cf=db.campos.find(x=>x.id==cos.campoId);
            const cams=db.cosechaCamiones.filter(c=>c.cosechaId==cos.id);
            const kgCams=cams.reduce((s,c)=>s+c.kg,0);
            const kgSilos=(cos.silobolsas&&cos.silobolsas.length>0?(cos.silobolsas||[]).reduce((s,sb)=>s+(parseFloat(sb.kg)||0),0):(parseFloat(cos.kgSilo)||0));
            const totalLote=kgSilos+kgCams;
            const haLote=parseFloat(cos.haLote)||0;
            const promHa=haLote>0&&totalLote>0?Math.round(totalLote/haLote):0;
            return(
              <Panel key={cos.id} accent={C.v}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                  <div>
                    <div style={{fontWeight:900,fontSize:"0.96rem"}}>🌽 {cos.cereal} — {cf?cf.nombre:"—"}</div>
                    <div style={{fontSize:"0.74rem",color:C.md,marginTop:2}}>Lote: {cos.lote||"—"}{haLote>0?` · ${haLote} ha`:""} · {cos.fecha}</div>
                    {(cos.hum||cos.humMax)&&<div style={{fontSize:"0.72rem",color:C.md,marginTop:1}}>Hum: {cos.hum||"?"}%{cos.humMax?`–${cos.humMax}%`:""} · Brutos: {fmt(cos.brutos||0)} kg</div>}
                  </div>
                  <div style={{display:"flex",gap:5}}>
                    <Btn sz="xs" v="ghost" onClick={()=>abrirEditar(cos)}>✏️</Btn>
                    <Btn sz="xs" v="orange" onClick={()=>abrirCam(cos)}>🚛 +Cam</Btn>
                    <Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar cosecha?"))setDb({...db,cosechas:db.cosechas.filter(x=>x.id!==cos.id)});}}>🗑️</Btn>
                  </div>
                </div>
                <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:8}}>
                  <div style={{background:C.v3,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                    <div style={{fontSize:"0.64rem",color:C.md,fontWeight:700,textTransform:"uppercase"}}>Kg Netos</div>
                    <div style={{fontSize:"1.1rem",fontWeight:900,color:C.dk}}>{fmt(cos.netos||0)}</div>
                  </div>
                  <div style={{background:C.az3,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                    <div style={{fontSize:"0.64rem",color:C.md,fontWeight:700,textTransform:"uppercase"}}>A Silo</div>
                    <div style={{fontSize:"1.1rem",fontWeight:900,color:C.az}}>{fmt(kgSilos)}</div>
                  </div>
                  <div style={{background:C.na3,borderRadius:10,padding:"8px 10px",textAlign:"center"}}>
                    <div style={{fontSize:"0.64rem",color:C.md,fontWeight:700,textTransform:"uppercase"}}>A Camión</div>
                    <div style={{fontSize:"1.1rem",fontWeight:900,color:C.na}}>{fmt(kgCams)}</div>
                  </div>
                </div>
                {totalLote>0&&<div style={{background:`linear-gradient(135deg,${C.dk},${C.dk2})`,borderRadius:12,padding:"11px 14px",marginBottom:8,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div style={{textAlign:"center"}}>
                    <div style={{fontSize:"0.62rem",color:"rgba(255,255,255,.6)",fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Total lote</div>
                    <div style={{fontSize:"1.25rem",fontWeight:900,color:"#fff"}}>{fmt(totalLote)} kg</div>
                    <div style={{fontSize:"0.7rem",color:"rgba(255,255,255,.5)"}}>{(totalLote/1000).toFixed(1)} t</div>
                  </div>
                  <div style={{textAlign:"center",borderLeft:"1px solid rgba(255,255,255,.15)"}}>
                    <div style={{fontSize:"0.62rem",color:"rgba(255,255,255,.6)",fontWeight:700,textTransform:"uppercase",marginBottom:3}}>Promedio</div>
                    <div style={{fontSize:"1.25rem",fontWeight:900,color:promHa>0?C.v2:"rgba(255,255,255,.4)"}}>{promHa>0?fmt(promHa)+" kg/ha":"Sin ha"}</div>
                    {haLote>0&&<div style={{fontSize:"0.7rem",color:"rgba(255,255,255,.5)"}}>{haLote} ha</div>}
                  </div>
                </div>}
                {/* Silobolsas */}
                {(cos.silobolsas||[]).length>0&&<div style={{marginBottom:6}}>
                  <div style={{fontSize:"0.7rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:4}}>🛍️ Silobolsas:</div>
                  {(cos.silobolsas||[]).map((sb,i)=>(
                    <div key={i} style={{background:C.v3,borderRadius:8,padding:"5px 9px",marginBottom:3,fontSize:"0.78rem",display:"flex",justifyContent:"space-between"}}>
                      <span>Bolsa <b>{sb.num}</b> — {fmt(sb.kg)} kg</span>
                    </div>
                  ))}
                </div>}
                {/* Camiones */}
                {cams.length>0&&<div style={{marginTop:6}}>
                  <div style={{fontSize:"0.7rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:4}}>Camiones directos:</div>
                  {cams.map((c,i)=>(
                    <div key={i} style={{background:C.bg,borderRadius:9,padding:"6px 10px",marginBottom:4,fontSize:"0.78rem",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <span><b>{fmt(c.kg)} kg</b> · {c.camionNom||"—"}{c.chofer?` · ${c.chofer}`:""} · {c.dest||"—"}{c.cupo&&c.cupo!=="Sin cupo"?` · Cupo: ${c.cupo}`:""}</span>
                      <div style={{display:"flex",gap:4,alignItems:"center"}}>
                        <span style={{color:C.lt,fontSize:"0.7rem"}}>{c.fecha}</span>
                        <Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,cosechaCamiones:db.cosechaCamiones.filter(x=>x.id!==c.id)});}}>🗑️</Btn>
                      </div>
                    </div>
                  ))}
                </div>}
              </Panel>
            );
          })}
      </div>}

      {tab==="camiones"&&<div>
        <Tabla heads={["Fecha","Campo","Lote","Cereal","Kg","Camión","Chofer","Cupo","Destino",""]}
          rows={db.cosechaCamiones.slice().reverse().map(c=>{
            const cos=db.cosechas.find(x=>x.id==c.cosechaId);
            return<tr key={c.id}>
              <Td>{c.fecha}</Td><Td>{cos?camNom(db,cos.campoId):"—"}</Td><Td>{cos?cos.lote||"—":"—"}</Td>
              <Td>{c.cereal||"—"}</Td><Td bold>{fmt(c.kg)}</Td>
              <Td>{c.camionNom||"—"}</Td><Td>{c.chofer||"—"}</Td>
              <Td>{c.cupo||"—"}</Td><Td>{c.dest||"—"}</Td>
              <Td><Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,cosechaCamiones:db.cosechaCamiones.filter(x=>x.id!==c.id)});}}>🗑️</Btn></Td>
            </tr>;
          })}/>
      </div>}

      {/* MODAL COSECHA (nueva o editar) */}
      <Modal open={mC} onClose={()=>{setMC(false);setEditCos(null);setF({});}} title={editCos?"✏️ Editar Cosecha":"🌽 Registrar Cosecha"}>
        <FR>
          <Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/>
          <Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/>
        </FR>
        <FR>
          <Inp label="Lote" value={f.lote||""} onChange={v=>sf("lote",v)} opts={f.campoId?[{v:"",l:"-- Seleccionar --"},...[...new Set(db.lotes.filter(l=>l.campoId==f.campoId).map(l=>l.nom))].map(n=>({v:n,l:n})),{v:"__otro",l:"Otro..."}]:[{v:"",l:"-- Elegí campo --"}]}/>
          <Inp label="Cereal" value={f.cereal||"Soja"} onChange={v=>sf("cereal",v)} opts={CERALES}/>
        </FR>
        {f.lote==="__otro"&&<Inp label="Nombre del lote" value={f.loteManual||""} onChange={v=>sf("loteManual",v)} sx={{marginBottom:9}}/>}
        <div style={{background:C.v3,border:"1.5px solid #b8f0d8",borderRadius:13,padding:13,marginBottom:10}}>
          <div style={{fontSize:"0.72rem",fontWeight:800,color:C.v,textTransform:"uppercase",marginBottom:9}}>📊 Datos de cosecha</div>
          <FR>
            <Inp label="Ha cosechadas" type="number" value={f.haLote||""} onChange={v=>sf("haLote",v)} placeholder="Ej: 48"/>
            <Inp label="Kg brutos" type="number" value={f.brutos||""} onChange={v=>sf("brutos",v)}/>
          </FR>
          <FR>
            <Inp label="Humedad mín %" type="number" value={f.hum||""} onChange={v=>sf("hum",v)} placeholder="Ej: 14.5"/>
            <Inp label="Humedad máx %" type="number" value={f.humMax||""} onChange={v=>sf("humMax",v)} placeholder="Ej: 16"/>
          </FR>
          <Inp label="Descuento (kg)" type="number" value={f.desc||"0"} onChange={v=>sf("desc",v)} sx={{marginBottom:0}}/>
        </div>

        {/* Silobolsas múltiples */}
        <div style={{background:C.az3,border:"1.5px solid #b8d5f8",borderRadius:13,padding:13,marginBottom:10}}>
          <div style={{fontSize:"0.72rem",fontWeight:800,color:C.az,textTransform:"uppercase",marginBottom:9}}>🛍️ Silobolsas — {!editCos?"se crean automáticamente en Silos":"editables"}</div>
          {(f.silobolsas||[]).map((sb,i)=>(
            <div key={i} style={{display:"flex",gap:8,marginBottom:8,alignItems:"flex-end"}}>
              <Inp label={`Nº Bolsa`} value={sb.num||""} onChange={v=>{const ns=[...(f.silobolsas||[])];ns[i]={...ns[i],num:v};sf("silobolsas",ns);}} sx={{flex:1}}/>
              <Inp label="Kg" type="number" value={sb.kg||""} onChange={v=>{const ns=[...(f.silobolsas||[])];ns[i]={...ns[i],kg:v};sf("silobolsas",ns);}} sx={{flex:1}}/>
              <button onClick={()=>sf("silobolsas",(f.silobolsas||[]).filter((_,j)=>j!==i))} style={{background:C.ro3,border:"none",borderRadius:8,padding:"10px",cursor:"pointer",color:C.ro,fontWeight:800,marginBottom:0,flexShrink:0}}>✕</button>
            </div>
          ))}
          <Btn v="blue" sz="sm" onClick={()=>sf("silobolsas",[...(f.silobolsas||[]),{num:`${(f.silobolsas||[]).length+1}`,kg:""}])}>+ Agregar bolsa</Btn>
        </div>

        <MBtns onClose={()=>{setMC(false);setEditCos(null);setF({});}} saveLabel={editCos?"Guardar cambios":"Registrar cosecha"} onSave={guardarCosecha}/>
      </Modal>

      {/* MODAL CAMIÓN */}
      <Modal open={mCam} onClose={()=>{setMCam(false);setCosechaSel(null);}} title="🚛 Agregar camión de cosecha">
        {cosechaSel&&<InfoBox text={`🌽 ${cosechaSel.cereal} — ${camNom(db,cosechaSel.campoId)} — Lote ${cosechaSel.lote||"—"}`} color="green" emoji=""/>}
        <FR><Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/><Inp label="Kg cargados" type="number" value={f.kg||""} onChange={v=>sf("kg",v)}/></FR>
        <div style={{background:C.az3,border:"1.5px solid #b8d5f8",borderRadius:13,padding:13,marginBottom:10}}>
          <div style={{fontSize:"0.72rem",fontWeight:800,color:C.az,textTransform:"uppercase",marginBottom:9}}>🚛 Datos del camión</div>
          <Inp label="Camión" value={f.camionId||""} onChange={v=>{sf("camionId",v);const cam=db.camiones.find(c=>c.id==v);if(cam){sf("camionNom",cam.nom);sf("patente",cam.pat);}}} opts={[{v:"",l:"-- Seleccionar --"},...db.camiones.map(c=>({v:c.id,l:c.nom})),{v:"carro",l:"🐄 Carro"},{v:"otro",l:"Otro camión..."}]} sx={{marginBottom:9}}/>

function SecCamiones({db,setDb}){

// ── SANIDAD ANIMAL ────────────────────────────────────────
function SecSanidad({db,setDb}){
  const [mS,setMS]=useState(false);
  const [filtCat,setFiltCat]=useState("Todas");
  const [filtCampo,setFiltCampo]=useState("todos");
  const [f,setF]=useState({});const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const h30=new Date();h30.setDate(h30.getDate()+30);
  const CATS_ANIM=["Todas","Vacas","Novillos","Novillitos","Terneros","Vaquillonas","Toros","Todo el rodeo","Cerdos","Ovinos","Caballos","Otro"];
  const proximas=db.sanidad.filter(s=>s.proxima&&new Date(s.proxima)<=h30&&s.estado!=="Realizada");

  // Filtrar registros
  const lista=db.sanidad.filter(s=>{
    const matchCat=filtCat==="Todas"||s.categoria===filtCat;
    const matchCampo=filtCampo==="todos"||s.campoId==filtCampo;
    return matchCat&&matchCampo;
  });

  return(
    <div>
      {proximas.length>0&&<InfoBox text={`⚠️ ${proximas.length} aplicación próxima en los próximos 30 días: ${proximas.map(s=>s.descripcion).join(", ")}`} color="orange" emoji="💊"/>}

      <div style={{display:"flex",gap:7,marginBottom:12}}>
        <Btn v="purple" onClick={()=>{setF({fecha:hoy(),tipo:"Vacunación",estado:"Realizada",campoId:(db.campos[0]&&db.campos[0].id),categoria:"Todo el rodeo"});setMS(true);}}>+ Registrar sanidad</Btn>
      </div>

      {/* FILTROS */}
      <Panel title="🔍 Filtrar registros" accent={C.vi}>
        <FR>
          <Inp label="Por categoría animal" value={filtCat} onChange={v=>setFiltCat(v)} opts={CATS_ANIM}/>
          <Inp label="Por campo" value={filtCampo} onChange={v=>setFiltCampo(v)} opts={[{v:"todos",l:"Todos los campos"},...db.campos.map(c=>({v:c.id,l:c.nombre}))]}/>
        </FR>
        {(filtCat!=="Todas"||filtCampo!=="todos")&&<div style={{fontSize:"0.78rem",color:C.vi,fontWeight:700}}>
          Mostrando {lista.length} registro{lista.length!==1?"s":""}{filtCat!=="Todas"?` de ${filtCat}`:""}
          {filtCampo!=="todos"?` en ${camNom(db,filtCampo)}`:""}
        </div>}
      </Panel>

      {/* LISTADO */}
      {!lista.length
        ?<div style={{textAlign:"center",padding:30,color:C.lt}}><div style={{fontSize:"2.5rem"}}>💊</div><p>Sin registros{filtCat!=="Todas"?` para ${filtCat}`:""}</p></div>
        :lista.slice().reverse().map(s=>{
          const ec=s.estado==="Realizada"?"green":s.proxima&&new Date(s.proxima)<=h30?"orange":"blue";
          return(
            <Panel key={s.id} accent={s.estado==="Realizada"?C.v:s.proxima&&new Date(s.proxima)<=h30?C.na:C.vi}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                <div>
                  <div style={{fontWeight:900,fontSize:"0.95rem"}}>💊 {s.descripcion||"—"}</div>
                  <div style={{fontSize:"0.74rem",color:C.md,marginTop:2}}>
                    📅 {s.fecha} · 🌾 {camNom(db,s.campoId)}
