// ── PESADAS ───────────────────────────────────────────────
function SecPesadas({db,setDb}){
  const [mP,setMP]=useState(false);const [f,setF]=useState({});const sf=(k,v)=>setF(p=>({...p,[k]:v}));
  const gdpCards=[];
  const gdpData={};
  db.pesadas.forEach(p=>{
    const key=`${p.campoId}||${p.categoria}`;
    if(!gdpData[key])gdpData[key]=[];
    gdpData[key].push({fecha:p.fecha,peso:parseFloat(p.peso)||0});
  });
  Object.entries(gdpData).forEach(([key,arr])=>{
    if(arr.length>=2){
      arr.sort((a,b)=>a.fecha.localeCompare(b.fecha));
      const prim=arr[0];const ult=arr[arr.length-1];
      const dias=Math.round((new Date(ult.fecha)-new Date(prim.fecha))/(1000*60*60*24));
      const gdp=dias>0?((ult.peso-prim.peso)/dias).toFixed(2):0;
      const [cId,cat]=key.split("||");
      gdpCards.push({cId,cat,gdp,inicio:prim.peso,fin:ult.peso,desde:prim.fecha,hasta:ult.fecha});
    }
  });
  return(
    <div>
      <div style={{display:"flex",gap:7,marginBottom:12}}><Btn v="brown" onClick={()=>{setF({fecha:hoy(),campoId:(db.campos[0]&&db.campos[0].id)});setMP(true);}}>+ Registrar pesada</Btn></div>
      {gdpCards.length>0&&<>
        <div style={{fontSize:"0.75rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:8}}>📈 Ganancia diaria de peso (GDP)</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(155px,1fr))",gap:10,marginBottom:14}}>
          {gdpCards.map((g,i)=><GC key={i} title={`${camNom(db,g.cId)} – ${g.cat}`} val={`${g.gdp} kg/día`} sub={`${g.inicio}→${g.fin}kg`} acc={parseFloat(g.gdp)>0.8?C.v:parseFloat(g.gdp)>0.5?C.am:C.ro} emoji="⚖️"/>)}
        </div>
      </>}
      <Tabla heads={["Fecha","Campo","Categoría","Cant.","Peso prom.(kg)","Cond.corporal","Nota"]}
        rows={db.pesadas.slice().reverse().map(p=><tr key={p.id}><Td>{p.fecha}</Td><Td>{camNom(db,p.campoId)}</Td><Td bold>{p.categoria||"—"}</Td><Td>{p.cantidad||"—"}</Td><Td bold>{p.peso||"—"}</Td><Td>{p.cc||"—"}</Td><Td>{p.nota||"—"}</Td></tr>)}/>
      <Modal open={mP} onClose={()=>setMP(false)} title="⚖️ Registrar Pesada">
        <FR><Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/><Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/></FR>
        <FR><Inp label="Categoría" value={f.categoria||""} onChange={v=>sf("categoria",v)} placeholder="Ej: Novillos"/><Inp label="Cantidad animales" type="number" value={f.cantidad||""} onChange={v=>sf("cantidad",v)}/></FR>
        <FR><Inp label="Peso promedio (kg)" type="number" value={f.peso||""} onChange={v=>sf("peso",v)}/><Inp label="Condición corporal (1-9)" type="number" value={f.cc||""} onChange={v=>sf("cc",v)}/></FR>
        <Inp label="Nota" value={f.nota||""} onChange={v=>sf("nota",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>setMP(false)} sv="brown" onSave={()=>{const nd=addMov({...db,pesadas:[...db.pesadas,{id:Date.now(),...f}]},`⚖️ Pesada: ${f.categoria||""} ${f.peso||"?"}kg`);setDb(nd);setMP(false);setF({});}}/>
      </Modal>
    </div>
  );
}

  const tot={};db.combustible.forEach(c=>{tot[c.tipo]=(tot[c.tipo]||0)+c.litros});

        if(!Object.keys(porTanque).length)return null;
        return<Panel title="⛽ Consumo por tanque" accent={C.na}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:9}}>
            {["Blanco","Amarillo","Rojo"].filter(t=>porTanque[t]).map(t=>(
              <div key={t} style={{background:t==="Rojo"?C.ro3:t==="Amarillo"?C.am3:C.bg,borderRadius:11,padding:"10px",textAlign:"center",border:`1.5px solid ${t==="Rojo"?C.ro:t==="Amarillo"?C.am:"#e2e8f0"}`}}>
                <div style={{fontSize:"0.65rem",fontWeight:800,textTransform:"uppercase",color:C.md}}>Tanque {t}</div>
                <div style={{fontSize:"1.1rem",fontWeight:900,color:t==="Rojo"?C.ro:t==="Amarillo"?"#8a6000":C.dk}}>{fmt(porTanque[t])} L</div>
              </div>
            ))}
          </div>
        </Panel>;
      })()}
      <Tabla heads={["Fecha","Tipo","Tanque","Litros","$/L","Total","Máquina","Campo"]}
        rows={db.combustible.slice().reverse().map(c=>{const cf=db.campos.find(x=>x.id==c.campoId);return<tr key={c.id}><Td>{c.fecha}</Td><Td>{c.tipo}</Td><Td><span style={{fontWeight:700,color:c.tanque==="Rojo"?C.ro:c.tanque==="Amarillo"?"#8a6000":C.md}}>⛽{c.tanque||"—"}</span></Td><Td>{c.litros}</Td><Td>${c.precio}</Td><Td bold>${fmt(c.total)}</Td><Td>{c.maq||"—"}</Td><Td>{cf?cf.nombre:"—"}</Td></tr>;})}/>
      <Modal open={mC} onClose={()=>setMC(false)} title="⛽ Carga Combustible">
        <FR><Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/><Inp label="Tipo" value={f.tipo||"Gasoil"} onChange={v=>sf("tipo",v)} opts={["Gasoil","Nafta Super","Nafta Premium"]}/></FR>

        {/* TANQUE */}
        <div style={{marginBottom:10}}>
          <label style={{fontSize:"0.7rem",fontWeight:800,color:C.md,textTransform:"uppercase",letterSpacing:"0.4px",display:"block",marginBottom:8}}>⛽ Tanque de origen</label>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8}}>
            {[{v:"Blanco",c:"#f8f9fa",bc:"#dee2e6",tc:"#495057"},{v:"Amarillo",c:"#fff9c4",bc:"#f5c842",tc:"#7a6000"},{v:"Rojo",c:"#fff0f0",bc:"#e05252",tc:"#c0392b"}].map(t=>(
              <button key={t.v} onClick={()=>sf("tanque",t.v)} style={{padding:"12px 6px",borderRadius:12,border:`2px solid ${f.tanque===t.v?t.bc:"#e2e8f0"}`,background:f.tanque===t.v?t.c:"#fff",cursor:"pointer",fontFamily:"inherit",fontWeight:800,color:f.tanque===t.v?t.tc:C.md,fontSize:"0.82rem",textAlign:"center"}}>
                ⛽ {t.v}
              </button>
            ))}
          </div>
        </div>

        <FR><Inp label="Litros" type="number" value={f.litros||""} onChange={v=>sf("litros",v)}/><Inp label="Precio/L($)" type="number" value={f.precio||""} onChange={v=>sf("precio",v)}/></FR>
        <FR>
          <Inp label="Máquina" value={f.maqId||""} onChange={v=>{sf("maqId",v);const mq=db.maquinas.find(m=>m.id==v);if(mq)sf("maq",mq.nom);}} opts={[{v:"",l:"-- Seleccionar --"},...db.maquinas.map(m=>({v:m.id,l:m.nom})),{v:"otra",l:"Otra..."}]}/>
          <Inp label="Campo" value={f.campoId||""} onChange={v=>sf("campoId",v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/>
        </FR>
        {f.maqId==="otra"&&<Inp label="Máquina / descripción" value={f.maq||""} onChange={v=>sf("maq",v)} sx={{marginBottom:9}}/>}
        <MBtns onClose={()=>setMC(false)} onSave={()=>{
          const li=parseFloat(f.litros)||0,pr=parseFloat(f.precio)||0;
          const nd=addMov({...db,combustible:[...db.combustible,{id:Date.now(),...f,litros:li,precio:pr,total:li*pr}]},`⛽ ${li}L ${f.tipo} – Tanque ${f.tanque||"—"} → ${f.maq||"—"}`);
          setDb(nd);setMC(false);setF({});
        }}/>
      </Modal>
    </div>
  );
}

// ── AGENDA ────────────────────────────────────────────────

        {pend.length>0&&<div style={{padding:"7px 14px",borderRadius:30,background:C.ro3,color:C.ro,fontSize:"0.76rem",fontWeight:800}}>{pend.length} pendiente{pend.length>1?"s":""}</div>}
      </div>

          <Td><div style={{display:"flex",gap:4}}>

            <Btn sz="xs" v="ghost" onClick={()=>{setF({...t});setMT(true);}}>✏️</Btn>
            <Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,tareas:db.tareas.filter(x=>x.id!==t.id)});}}>🗑️</Btn>
          </div></Td>
        </tr>)}/>
      <Modal open={mT} onClose={()=>{setMT(false);setF({});}} title={f.id?"✏️ Editar Tarea":"📅 Nueva Tarea / Recordatorio"}>
        <FR><Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/><Inp label="Tarea" value={f.nom||""} onChange={v=>sf("nom",v)}/></FR>
        <FR><Inp label="Campo / Lote" value={f.campo||""} onChange={v=>sf("campo",v)}/><Inp label="Responsable" value={f.resp||""} onChange={v=>sf("resp",v)}/></FR>
        <FR><Inp label="Prioridad" value={f.prioridad||"Normal"} onChange={v=>sf("prioridad",v)} opts={["Normal","Alta","Urgente","Baja"]}/><Inp label="Estado" value={f.est||"Pendiente"} onChange={v=>sf("est",v)} opts={["Pendiente","En curso","Completada"]}/></FR>
        <Inp label="Detalle / Nota" value={f.nota||""} onChange={v=>sf("nota",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>setMT(false)} onSave={()=>{const nd=f.id?addMov({...db,tareas:db.tareas.map(x=>x.id===f.id?{...f}:x)},`✏️ Tarea editada: ${f.nom}`):addMov({...db,tareas:[...db.tareas,{id:Date.now(),...f}]},`📅 Tarea: ${f.nom}`);setDb(nd);setMT(false);setF({});}}/>
      </Modal>
    </div>
  );
}

// ── REPORTE POR CAMPO ─────────────────────────────────────
function SecReporte({db}){
  const [campoId,setCampoId]=useState((db.campos[0]&&db.campos[0].id)||"");
  const [anio,setAnio]=useState(db.years[db.years.length-1]);
  const [waO,setWaO]=useState(false);const [waT,setWaT]=useState("");

  const generar=()=>{
    const c=db.campos.find(x=>x.id==campoId);if(!c)return;
    const lotes=db.lotes.filter(l=>l.campoId==campoId&&l.anio==anio);
    const cosechas=db.cosechas.filter(x=>x.campoId==campoId);
    const gastos=db.gastos.filter(x=>x.campoId==campoId);
    const lluvias=db.lluvias.filter(x=>x.campoId==campoId);
    const retiros=db.retiros.filter(x=>x.campoId==campoId&&x.anio==anio);
    const totalCos=cosechas.reduce((s,x)=>s+(x.netos||0),0);
    const totalGas=gastos.reduce((s,x)=>s+x.monto,0);
    const totalMm=lluvias.reduce((s,x)=>s+parseFloat(x.mm||0),0);
    const haTotales=lotes.reduce((s,l)=>s+(parseFloat(l.ha)||0),0);
    let txt=`🌾 *REPORTE CAMPO: ${c.nombre}*\n`;
    txt+=`📍 ${c.localidad||"—"} · ${c.ha||"?"} ha · Propietario: ${c.propietario||"—"}\n`;
    txt+=`📅 Campaña ${anio}/${parseInt(anio)+1}\n\n`;
    if(lotes.length){txt+=`*🗺️ LOTES (${lotes.length}):*\n`;lotes.forEach(l=>{txt+=`• ${l.nom} — ${l.ha||"?"}ha — ${l.cereal||"—"} ${l.variedad||""}`;if(l.semillaKg)txt+=` — Semilla: ${l.semillaKg}kg/ha`;if(l.ureaKg)txt+=` — Urea: ${l.ureaKg}kg/ha`;txt+=`\n`;});}
    if(totalCos>0){txt+=`\n*🌽 COSECHA:*\n`;const porCer={};cosechas.forEach(c=>{porCer[c.cereal]=(porCer[c.cereal]||0)+(c.netos||0);});Object.entries(porCer).forEach(([cer,kg])=>txt+=`• ${cer}: ${fmt(kg)} kg netos\n`);txt+=`Total: *${fmt(totalCos)} kg* (${(totalCos/1000).toFixed(1)} t)\n`;}
    if(retiros.length){txt+=`\n*📦 INSUMOS USADOS (${anio}/${parseInt(anio)+1}):*\n`;const porTipo={};retiros.forEach(r=>{if(!porTipo[r.tipo])porTipo[r.tipo]=0;porTipo[r.tipo]+=r.qty||0;});Object.entries(porTipo).forEach(([t,qty])=>txt+=`• ${t}: ${fmt(qty)}\n`);}
    if(totalGas>0){txt+=`\n*💰 GASTOS TOTALES: $${fmt(totalGas)}*\n`;if(haTotales>0)txt+=`Costo/ha: $${fmt(Math.round(totalGas/haTotales))}\n`;}
    if(totalMm>0)txt+=`\n*🌧️ LLUVIA TOTAL: ${totalMm.toFixed(0)} mm*\n`;
    txt+=`\n_Generado con GenAFarm · ${new Date().toLocaleDateString("es-AR")}_`;
    setWaT(txt);setWaO(true);
  };

  return(
    <div>
      <InfoBox text="Generá un resumen completo de un campo para compartir por WhatsApp con el dueño o para tus registros." color="blue" emoji="📊"/>
      <Panel title="Seleccioná el campo y campaña" accent={C.az}>
        <FR><Inp label="Campo" value={campoId} onChange={v=>setCampoId(v)} opts={db.campos.map(c=>({v:c.id,l:c.nombre}))}/><Inp label="Campaña" value={anio} onChange={v=>setAnio(v)} opts={db.years}/></FR>
        <Btn onClick={generar} sx={{width:"100%",justifyContent:"center"}}>📊 Generar reporte completo</Btn>
      </Panel>
      {waO&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:14,backdropFilter:"blur(4px)"}}>
          <div style={{background:"#fff",borderRadius:22,padding:22,width:"100%",maxWidth:490,boxShadow:"0 24px 64px rgba(0,0,0,.25)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <h3 style={{fontSize:"1.05rem",fontWeight:900}}>📊 Reporte listo</h3>
              <button onClick={()=>setWaO(false)} style={{background:"#f0f4f8",border:"none",width:30,height:30,borderRadius:"50%",cursor:"pointer"}}>✕</button>
            </div>
            <div style={{background:"#e9f7ef",borderRadius:11,padding:13,fontSize:"0.76rem",whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:280,overflowY:"auto",fontFamily:"monospace",color:"#1a3a2a",lineHeight:1.6,marginBottom:12}}>{waT}</div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn v="ghost" onClick={()=>setWaO(false)}>Cerrar</Btn>
              <Btn v="wa" onClick={()=>window.open("https://wa.me/?text="+encodeURIComponent(waT),"_blank")}>📱 Enviar por WhatsApp</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}



// ── RESUMEN ECONÓMICO ─────────────────────────────────────
function SecResumen({db}){
  const [campania,setCampania]=useState(CAMPANIAS[3]||db.years[db.years.length-1]);
  const [tab,setTab]=useState("general");

  // ── INGRESOS ──
  // Ventas de grano de esa campaña
  const ventasGrano=db.ventas.filter(v=>v.campania===campania||(v.fechaEntrega&&v.fechaEntrega.startsWith(campania.slice(0,4)))||(v.fecha&&v.fecha.startsWith(campania.slice(0,4))));
  const ingrVentas=ventasGrano.reduce((s,v)=>s+(parseFloat(v.precio||0)*parseFloat(v.toneladas||0)*1000),0);

  // Ventas de animales
  const ventasAnim=db.movAnim.filter(m=>m.tipo==="Venta"&&m.fecha&&m.fecha.startsWith(campania.slice(0,4)));
  const ingrAnimales=ventasAnim.reduce((s,m)=>s+(parseFloat(m.precio||0)*parseFloat(m.cant||0)),0);

  const totalIngresos=ingrVentas+ingrAnimales;

  // ── GASTOS ──
  const gastosCamp=db.gastos.filter(g=>g.campania===campania||(g.fecha&&g.fecha.startsWith(campania.slice(0,4))));
  const totalGastos=gastosCamp.reduce((s,g)=>s+(parseFloat(g.monto)||0),0);

  // Gastos por categoría
  const gastosCat={};
  gastosCamp.forEach(g=>{
    const cat=g.cat||"Otros";
    if(!gastosCat[cat])gastosCat[cat]=0;
    gastosCat[cat]+=parseFloat(g.monto)||0;
  });

  // Insumos comprados
  const insumosCamp=(db.comprasIns||[]).filter(c=>c.fecha&&c.fecha.startsWith(campania.slice(0,4)));
  const totalInsumos=insumosCamp.reduce((s,c)=>s+(parseFloat(c.precio||0)*parseFloat(c.qty||0)),0);

  // Trabajos/servicios
  const trabajosCamp=(db.trabajos||[]).filter(t=>t.fecha&&t.fecha.startsWith(campania.slice(0,4)));
  const totalTrabajos=trabajosCamp.reduce((s,t)=>s+(parseFloat(t.monto)||0),0);

  // Pagos de personal
  const pagosCamp=db.pagos.filter(p=>p.fecha&&p.fecha.startsWith(campania.slice(0,4)));
  const totalPersonal=pagosCamp.reduce((s,p)=>s+(parseFloat(p.monto)||0),0);

  // Combustible
  const combCamp=db.combustible.filter(c=>c.fecha&&c.fecha.startsWith(campania.slice(0,4)));
  const totalComb=combCamp.reduce((s,c)=>s+(parseFloat(c.total)||0),0);

  const totalEgresos=totalGastos+totalInsumos+totalTrabajos+totalPersonal+totalComb;
  const resultado=totalIngresos-totalEgresos;

  // Cosecha de esa campaña
  const cosechasCamp=db.cosechas.filter(c=>c.campania===campania||(c.fecha&&c.fecha.startsWith(campania.slice(0,4))));
  const kgTotales=cosechasCamp.reduce((s,c)=>{
    const kgCams=db.cosechaCamiones.filter(x=>x.cosechaId==c.id).reduce((ss,x)=>ss+x.kg,0);
    const kgSilos=(c.silobolsas&&c.silobolsas.length>0?(c.silobolsas||[]).reduce((ss,sb)=>ss+(parseFloat(sb.kg)||0),0):(parseFloat(c.kgSilo)||0));
    return s+kgSilos+kgCams;
  },0);

  // Colores para las barras
  const COLCAT={
    "Ferretería":C.am,"Veterinaria":C.az,"Repuestos":C.na,
    "Combustible":C.v,"Mano de obra":C.vi,"Semillas":C.ce,
    "Agroquímicos":C.ma,"Arrendamiento":C.ro,"Seguros":C.lt,
    "Mercadería":C.dk2,"Otros":C.md,
    "Insumos comprados":"#e84393","Personal":C.vi,
    "Combustible (tanque)":C.v,"Trabajos/Servicios":C.ce
  };

  // Construir breakdown de egresos para la barra
  const breakdown=[
    ...Object.entries(gastosCat).map(([k,v])=>({label:k,val:v,col:COLCAT[k]||C.md})),
    ...(totalInsumos>0?[{label:"Insumos comprados",val:totalInsumos,col:"#e84393"}]:[]),
    ...(totalPersonal>0?[{label:"Personal",val:totalPersonal,col:C.vi}]:[]),
    ...(totalComb>0?[{label:"Combustible (tanque)",val:totalComb,col:C.v}]:[]),
    ...(totalTrabajos>0?[{label:"Trabajos/Servicios",val:totalTrabajos,col:C.ce}]:[]),
  ].sort((a,b)=>b.val-a.val);

  const maxBar=breakdown.length>0?breakdown[0].val:1;

  return(
    <div>
      {/* Selector de campaña */}
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:14,flexWrap:"wrap"}}>
        <span style={{fontSize:"0.75rem",fontWeight:800,color:C.md}}>Campaña:</span>
        {CAMPANIAS.map(cp=>(
          <button key={cp} onClick={()=>setCampania(cp)} style={{padding:"6px 14px",borderRadius:30,border:`1.5px solid ${cp===campania?C.az:"#e2e8f0"}`,background:cp===campania?C.az:"#fff",color:cp===campania?"#fff":C.md,fontSize:"0.76rem",fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
            {cp}
          </button>
        ))}
      </div>

      <Tabs items={[{id:"general",label:"📊 General"},{id:"detalle",label:"📋 Detalle"},{id:"cosecha",label:"🌽 Cosecha"}]} active={tab} onChange={setTab}/>

      {tab==="general"&&<>
        {/* TARJETAS PRINCIPALES */}
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          <div style={{background:`linear-gradient(135deg,${C.v},${C.v2})`,borderRadius:16,padding:16,boxShadow:`0 4px 20px ${C.v}44`}}>
            <div style={{fontSize:"0.7rem",fontWeight:800,color:"rgba(255,255,255,.75)",textTransform:"uppercase",marginBottom:6}}>💰 Ingresos totales</div>
            <div style={{fontSize:"1.6rem",fontWeight:900,color:"#fff"}}>${fmt(totalIngresos)}</div>
            {ingrVentas>0&&<div style={{fontSize:"0.72rem",color:"rgba(255,255,255,.7)",marginTop:4}}>🌽 Grano: ${fmt(ingrVentas)}</div>}
            {ingrAnimales>0&&<div style={{fontSize:"0.72rem",color:"rgba(255,255,255,.7)"}}>🐄 Animales: ${fmt(ingrAnimales)}</div>}
          </div>
          <div style={{background:`linear-gradient(135deg,${C.ro},#f07070)`,borderRadius:16,padding:16,boxShadow:`0 4px 20px ${C.ro}44`}}>
            <div style={{fontSize:"0.7rem",fontWeight:800,color:"rgba(255,255,255,.75)",textTransform:"uppercase",marginBottom:6}}>💸 Egresos totales</div>
            <div style={{fontSize:"1.6rem",fontWeight:900,color:"#fff"}}>${fmt(totalEgresos)}</div>
            <div style={{fontSize:"0.72rem",color:"rgba(255,255,255,.7)",marginTop:4}}>{breakdown.length} categorías</div>
          </div>
        </div>

        {/* RESULTADO NETO */}
        <div style={{background:resultado>=0?`linear-gradient(135deg,${C.v3},#d0f7e8)`:C.ro3,border:`2px solid ${resultado>=0?C.v:C.ro}`,borderRadius:18,padding:20,marginBottom:14,textAlign:"center"}}>
          <div style={{fontSize:"0.75rem",fontWeight:800,color:resultado>=0?C.v:C.ro,textTransform:"uppercase",letterSpacing:"1px",marginBottom:6}}>
            {resultado>=0?"✅ RESULTADO POSITIVO":"❌ RESULTADO NEGATIVO"}
          </div>
          <div style={{fontSize:"2.2rem",fontWeight:900,color:resultado>=0?C.v:C.ro,letterSpacing:"-1px"}}>
            {resultado>=0?"+ ":"- "}${fmt(Math.abs(resultado))}
          </div>
          {totalIngresos>0&&<div style={{fontSize:"0.78rem",color:C.md,marginTop:8}}>
            Margen: {Math.round((resultado/totalIngresos)*100)}% sobre ingresos
          </div>}
        </div>

        {/* BARRA DE EGRESOS POR CATEGORÍA */}
        {breakdown.length>0&&<Panel title="📊 Egresos por categoría" accent={C.ro}>
          {breakdown.map((item,i)=>(
            <div key={i} style={{marginBottom:10}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <span style={{fontSize:"0.78rem",fontWeight:700,color:C.dk2}}>{item.label}</span>
                <span style={{fontSize:"0.82rem",fontWeight:900,color:C.dk}}>${fmt(item.val)}</span>
              </div>
              <div style={{background:"#f0f4f8",borderRadius:20,height:8,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.round((item.val/maxBar)*100)}%`,background:item.col||C.md,borderRadius:20,transition:"width .4s"}}/>
              </div>
              <div style={{fontSize:"0.68rem",color:C.lt,marginTop:2,textAlign:"right"}}>
                {totalEgresos>0?Math.round((item.val/totalEgresos)*100):0}% del total
              </div>
            </div>
          ))}
        </Panel>}

        {/* RESUMEN RÁPIDO */}
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(130px,1fr))",gap:9}}>
          {totalGastos>0&&<GC title="Gastos" val={"$"+fmt(totalGastos)} acc={C.na} emoji="💰"/>}
          {totalInsumos>0&&<GC title="Insumos" val={"$"+fmt(totalInsumos)} acc="#e84393" emoji="📦"/>}
          {totalPersonal>0&&<GC title="Personal" val={"$"+fmt(totalPersonal)} acc={C.vi} emoji="👷"/>}
          {totalComb>0&&<GC title="Combustible" val={"$"+fmt(totalComb)} acc={C.v} emoji="⛽"/>}
          {totalTrabajos>0&&<GC title="Servicios" val={"$"+fmt(totalTrabajos)} acc={C.ce} emoji="🔧"/>}
        </div>
      </>}

      {tab==="detalle"&&<>

// ── STOCK DE GRANOS ──────────────────────────────────────
function SecStockGranos({db}){
  const [filtCereal,setFiltCereal]=useState("Todos");

  // Calcular stock por cereal
  const cerealesUsados=[...new Set([
    ...db.silos.map(s=>s.cereal),
    ...db.ventas.map(v=>v.cereal),
    ...(db.cosechaCamiones||[]).map(c=>c.cereal).filter(Boolean)
  ])].filter(Boolean);

  const resumenPorCereal={};
  cerealesUsados.forEach(cer=>{
    // En silobolsas (disponible)
    const enSilos=db.silos.filter(s=>s.cereal===cer&&s.estado!=="Vaciada").reduce((s,x)=>s+(x.kgRest||0),0);
    const totalEmbolsado=db.silos.filter(s=>s.cereal===cer).reduce((s,x)=>s+(x.kg||0),0);
    const salidoSilos=db.salidasSilo.filter(s=>s.cereal===cer).reduce((s,x)=>s+(x.kg||0),0);

    // Salido directo de cosecha a camión
    const salidoCosecha=db.cosechaCamiones.filter(c=>c.cereal===cer).reduce((s,x)=>s+(x.kg||0),0);

    // Vendido (toneladas → kg)
    const vendido=db.ventas.filter(v=>v.cereal===cer&&v.estado!=="Cancelado").reduce((s,v)=>s+(parseFloat(v.toneladas||0)*1000),0);
    const entregado=db.ventas.filter(v=>v.cereal===cer&&v.estado==="Entregado").reduce((s,v)=>s+(parseFloat(v.toneladas||0)*1000),0);
    const pendEntrega=db.ventas.filter(v=>v.cereal===cer&&(v.estado==="Pendiente"||v.estado==="Fijado")).reduce((s,v)=>s+(parseFloat(v.toneladas||0)*1000),0);

    // Total cosechado de este cereal
    const totalCosechado=db.cosechas.filter(c=>c.cereal===cer).reduce((s,c)=>{
      const kgCams=db.cosechaCamiones.filter(x=>x.cosechaId==c.id&&x.cereal===cer).reduce((ss,x)=>ss+x.kg,0);
      const kgSilos=(c.silobolsas&&c.silobolsas.length>0?(c.silobolsas||[]).reduce((ss,sb)=>ss+(parseFloat(sb.kg)||0),0):(parseFloat(c.kgSilo)||0));
      return s+kgSilos+kgCams;
    },0);

    resumenPorCereal[cer]={
      enSilos, totalEmbolsado, salidoSilos, salidoCosecha,
      vendido, entregado, pendEntrega, totalCosechado,
      disponible: enSilos // lo que queda en bolsas
    };
  });

  const cerealesFilt=filtCereal==="Todos"?cerealesUsados:cerealesUsados.filter(c=>c===filtCereal);
  const totalDisponible=cerealesFilt.reduce((s,c)=>s+(resumenPorCereal[c]?.disponible||0),0);

  return(
    <div>
      {/* Filtro cereal */}
      <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:12}}>
        {["Todos",...cerealesUsados].map(c=>(
          <button key={c} onClick={()=>setFiltCereal(c)} style={{padding:"7px 14px",borderRadius:30,border:`1.5px solid ${filtCereal===c?C.v:"#e2e8f0"}`,background:filtCereal===c?C.v:"#fff",color:filtCereal===c?"#fff":C.md,fontSize:"0.76rem",fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
            {c}
          </button>
        ))}
      </div>

      {/* Tarjeta resumen total */}
      {cerealesUsados.length>0&&<div style={{background:`linear-gradient(135deg,${C.dk},${C.dk2})`,borderRadius:18,padding:18,marginBottom:14}}>
        <div style={{fontSize:"0.72rem",fontWeight:800,color:"rgba(255,255,255,.6)",textTransform:"uppercase",marginBottom:6}}>📦 Total disponible en bolsas</div>
        <div style={{fontSize:"2rem",fontWeight:900,color:"#fff",marginBottom:4}}>{fmt(totalDisponible)} kg</div>
        <div style={{fontSize:"0.82rem",color:"rgba(255,255,255,.55)"}}>{(totalDisponible/1000).toFixed(1)} toneladas</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(100px,1fr))",gap:8,marginTop:12}}>
          {cerealesUsados.filter(c=>resumenPorCereal[c]?.disponible>0).map(c=>(
            <div key={c} style={{background:"rgba(255,255,255,.1)",borderRadius:10,padding:"8px",textAlign:"center"}}>
              <div style={{fontSize:"0.65rem",fontWeight:800,color:"rgba(255,255,255,.6)",textTransform:"uppercase"}}>{c}</div>
              <div style={{fontSize:"1rem",fontWeight:900,color:"#fff"}}>{fmt(resumenPorCereal[c].disponible)}</div>
              <div style={{fontSize:"0.62rem",color:"rgba(255,255,255,.4)"}}>kg</div>
            </div>
          ))}
        </div>
      </div>}

      {cerealesUsados.length===0&&<div style={{textAlign:"center",padding:40,color:C.lt}}>
        <div style={{fontSize:"2.5rem"}}>🌾</div>
        <p style={{marginTop:8,fontWeight:600}}>Sin datos de granos todavía</p>
        <p style={{fontSize:"0.8rem",marginTop:4}}>Registrá cosechas y silobolsas para ver el stock</p>
      </div>}

      {/* Detalle por cereal */}
      {cerealesFilt.map(cer=>{
        const r=resumenPorCereal[cer];
        if(!r)return null;
        const pctVendido=r.totalCosechado>0?Math.round((r.vendido/r.totalCosechado)*100):0;
        const pctDisp=r.totalCosechado>0?Math.round((r.disponible/r.totalCosechado)*100):0;

        // Silobolsas activas de este cereal
        const silosActivos=db.silos.filter(s=>s.cereal===cer&&s.estado!=="Vaciada"&&(s.kgRest||0)>0);

        return(
          <Panel key={cer} title={`🌾 ${cer}`} accent={ACCS[CERALES.indexOf(cer)%7]||C.v}>
            {/* Grid resumen */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(110px,1fr))",gap:8,marginBottom:12}}>
              <div style={{background:C.v3,borderRadius:12,padding:"10px",textAlign:"center",border:`1.5px solid ${C.v}33`}}>
                <div style={{fontSize:"0.62rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:3}}>En bolsas</div>
                <div style={{fontSize:"1.15rem",fontWeight:900,color:C.v}}>{fmt(r.disponible)}</div>
                <div style={{fontSize:"0.65rem",color:C.lt}}>kg disponibles</div>
              </div>
              <div style={{background:C.az3,borderRadius:12,padding:"10px",textAlign:"center",border:`1.5px solid ${C.az}33`}}>
                <div style={{fontSize:"0.62rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:3}}>Vendido</div>
                <div style={{fontSize:"1.15rem",fontWeight:900,color:C.az}}>{fmt(r.vendido)}</div>
                <div style={{fontSize:"0.65rem",color:C.lt}}>kg ({pctVendido}%)</div>
              </div>
              <div style={{background:C.na3,borderRadius:12,padding:"10px",textAlign:"center",border:`1.5px solid ${C.na}33`}}>
                <div style={{fontSize:"0.62rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:3}}>Pend. entrega</div>
                <div style={{fontSize:"1.15rem",fontWeight:900,color:C.na}}>{fmt(r.pendEntrega)}</div>
                <div style={{fontSize:"0.65rem",color:C.lt}}>kg</div>
              </div>
              <div style={{background:C.bg,borderRadius:12,padding:"10px",textAlign:"center",border:"1.5px solid #e2e8f0"}}>
                <div style={{fontSize:"0.62rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:3}}>Total cosecha</div>
                <div style={{fontSize:"1.15rem",fontWeight:900,color:C.dk}}>{fmt(r.totalCosechado)}</div>
                <div style={{fontSize:"0.65rem",color:C.lt}}>kg</div>
              </div>
            </div>

            {/* Barra de estado */}
            {r.totalCosechado>0&&<div style={{marginBottom:12}}>
              <div style={{display:"flex",justifyContent:"space-between",fontSize:"0.7rem",color:C.md,marginBottom:4}}>
                <span>Disponible {pctDisp}%</span>
                <span>Vendido {pctVendido}%</span>
              </div>
              <div style={{background:"#e2e8f0",borderRadius:20,height:10,overflow:"hidden",display:"flex"}}>
                <div style={{height:"100%",width:`${pctDisp}%`,background:C.v,borderRadius:"20px 0 0 20px",transition:"width .4s"}}/>
                <div style={{height:"100%",width:`${pctVendido}%`,background:C.az,transition:"width .4s"}}/>
                <div style={{height:"100%",flex:1,background:"#e2e8f0"}}/>
              </div>
              <div style={{display:"flex",gap:12,marginTop:4,fontSize:"0.68rem"}}>
                <span style={{color:C.v}}>● En bolsas</span>
                <span style={{color:C.az}}>● Vendido</span>
                <span style={{color:C.lt}}>● Salió a camión</span>
              </div>
            </div>}

            {/* Silobolsas activas */}
            {silosActivos.length>0&&<>
              <div style={{fontSize:"0.7rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:6}}>🛍️ Bolsas activas ({silosActivos.length})</div>
              {silosActivos.map(s=>{
                const pct=s.kg>0?Math.round((s.kgRest/s.kg)*100):0;
                return(
                  <div key={s.id} style={{background:C.bg,borderRadius:10,padding:"9px 12px",marginBottom:6}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                      <div>
                        <span style={{fontWeight:800,fontSize:"0.85rem"}}>Bolsa {s.num||"S/N"}</span>
                        <span style={{fontSize:"0.72rem",color:C.md,marginLeft:8}}>Lote {s.lote||"—"} · {s.fecha||"—"}</span>
                      </div>
                      <span style={{fontWeight:900,color:C.v,fontSize:"0.9rem"}}>{fmt(s.kgRest)} kg</span>
                    </div>
                    <div style={{background:"#e2e8f0",borderRadius:20,height:5,overflow:"hidden"}}>
                      <div style={{height:"100%",width:`${pct}%`,background:pct>50?C.v:pct>20?C.am:C.ro,borderRadius:20}}/>
                    </div>
                    <div style={{fontSize:"0.65rem",color:C.lt,textAlign:"right",marginTop:2}}>{pct}% restante de {fmt(s.kg)} kg</div>
                  </div>
                );
              })}
            </>}
          </Panel>
        );
      })}
    </div>
  );
}


// ── ARRENDAMIENTOS ────────────────────────────────────────
function SecArrendamientos({db,setDb}){
  const [mA,setMA]=useState(false);
  const [mP,setMP]=useState(false); // modal pago
  const [sel,setSel]=useState(null);
  const [f,setF]=useState({});const sf=(k,v)=>setF(p=>({...p,[k]:v}));

  const pagosArr=db.pagosArr||[];

  const hoy30=new Date();hoy30.setDate(hoy30.getDate()+60);

  const totalMensual=arr.filter(a=>a.estado==="Vigente"&&a.tipoPago==="Mensual").reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
  const totalAnual=arr.filter(a=>a.estado==="Vigente"&&a.tipoPago==="Anual").reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
  const totalHas=arr.filter(a=>a.estado==="Vigente").reduce((s,a)=>s+(parseFloat(a.ha)||0),0);

  return(
    <div>
      {proxVenc.length>0&&<InfoBox text={`⚠️ ${proxVenc.length} contrato${proxVenc.length>1?"s":""} vence en los próximos 60 días: ${proxVenc.map(a=>a.campo||a.propietario).join(", ")}`} color="orange" emoji="📋"/>}

        <GC title="Contratos" val={arr.filter(a=>a.estado==="Vigente").length} acc={C.ce} emoji="📋"/>
      </div>}

      {arr.length===0&&<div style={{textAlign:"center",padding:40,color:C.lt}}>
        <div style={{fontSize:"2.5rem"}}>📋</div>
        <p style={{marginTop:8,fontWeight:600}}>Sin arrendamientos registrados</p>
      </div>}

      {arr.map(a=>{
        const pagos=pagosArr.filter(p=>p.arrId===a.id);

              </div>
              <div style={{display:"flex",gap:5,alignItems:"center"}}>
                <Bdg label={a.estado||"Vigente"} col={ec}/>
                <Btn sz="xs" v="ghost" onClick={()=>{setF({...a});setMA(true);}}>✏️</Btn>
                <Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,arrendamientos:(db.arrendamientos||[]).filter(x=>x.id!==a.id)});}}>🗑️</Btn>
              </div>
            </div>

            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(120px,1fr))",gap:8,marginBottom:10}}>
              <div style={{background:C.bg,borderRadius:10,padding:"8px",textAlign:"center"}}>
                <div style={{fontSize:"0.62rem",color:C.md,fontWeight:700,textTransform:"uppercase"}}>Monto</div>
                <div style={{fontSize:"1rem",fontWeight:900,color:C.dk}}>{a.moneda==="Quintales"?`${a.monto} qq`:`$${fmt(a.monto)}`}</div>
                <div style={{fontSize:"0.65rem",color:C.lt}}>{a.tipoPago||"Anual"}</div>
              </div>
              <div style={{background:C.bg,borderRadius:10,padding:"8px",textAlign:"center"}}>
                <div style={{fontSize:"0.62rem",color:C.md,fontWeight:700,textTransform:"uppercase"}}>$/ha</div>
                <div style={{fontSize:"1rem",fontWeight:900,color:C.dk}}>{a.ha&&a.monto&&a.moneda!=="Quintales"?"$"+fmt(Math.round(parseFloat(a.monto)/parseFloat(a.ha))):"—"}</div>
              </div>
              {diasVenc!==null&&<div style={{background:diasVenc<=60?C.ro3:C.v3,borderRadius:10,padding:"8px",textAlign:"center"}}>
                <div style={{fontSize:"0.62rem",color:C.md,fontWeight:700,textTransform:"uppercase"}}>Vencimiento</div>
                <div style={{fontSize:"0.85rem",fontWeight:900,color:diasVenc<=60?C.ro:C.v}}>{a.vencimiento}</div>
                <div style={{fontSize:"0.62rem",color:diasVenc<=60?C.ro:C.lt}}>{diasVenc>0?`${diasVenc} días`:diasVenc===0?"Hoy":"Vencido"}</div>
              </div>}
            </div>

            {a.condiciones&&<div style={{background:C.bg,borderRadius:9,padding:"7px 10px",fontSize:"0.78rem",color:C.md,marginBottom:8}}>📝 {a.condiciones}</div>}

            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:"0.74rem",color:C.md}}>Pagado: <b style={{color:C.v}}>${fmt(totalPagado)}</b></div>
              <Btn sz="xs" v="green" onClick={()=>{setSel(a);setF({fecha:hoy(),arrId:a.id,monto:a.monto,concepto:`Arrendamiento ${a.campo||""}`});setMP(true);}}>💰 Registrar pago</Btn>
            </div>

            {pagos.length>0&&<div style={{marginTop:8}}>
              <div style={{fontSize:"0.68rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:4}}>Últimos pagos:</div>
              {pagos.slice(-3).reverse().map(p=>(
                <div key={p.id} style={{display:"flex",justifyContent:"space-between",fontSize:"0.74rem",padding:"4px 0",borderBottom:"1px solid #f0f4f8"}}>
                  <span>{p.fecha} · {p.concepto||"Pago"}</span>
                  <span style={{fontWeight:800,color:C.v}}>${fmt(p.monto)}</span>
                </div>
              ))}
            </div>}
          </Panel>
        );
      })}

      {/* MODAL ARRENDAMIENTO */}
      <Modal open={mA} onClose={()=>{setMA(false);setF({});}} title={f.id?"✏️ Editar Arrendamiento":"📋 Nuevo Arrendamiento"}>
        <FR>
          <Inp label="Campo / Establecimiento" value={f.campo||""} onChange={v=>sf("campo",v)} placeholder="Ej: La Esperanza"/>
          <Inp label="Propietario / Arrendador" value={f.propietario||""} onChange={v=>sf("propietario",v)} placeholder="Ej: Juan Pérez"/>
        </FR>
        <FR>
          <Inp label="Localidad" value={f.localidad||""} onChange={v=>sf("localidad",v)}/>
          <Inp label="Hectáreas" type="number" value={f.ha||""} onChange={v=>sf("ha",v)}/>
        </FR>
        <div style={{background:C.v3,border:"1.5px solid #b8f0d8",borderRadius:13,padding:13,marginBottom:10}}>
          <div style={{fontSize:"0.72rem",fontWeight:800,color:C.v,textTransform:"uppercase",marginBottom:9}}>💰 Condiciones de pago</div>
          <FR>
            <Inp label="Tipo de pago" value={f.tipoPago||"Anual"} onChange={v=>sf("tipoPago",v)} opts={["Mensual","Trimestral","Semestral","Anual","Por cosecha"]}/>
            <Inp label="Moneda" value={f.moneda||"Pesos"} onChange={v=>sf("moneda",v)} opts={["Pesos","Dólares","Quintales de soja","Quintales de maíz"]}/>
          </FR>
          <Inp label={`Monto (${f.moneda==="Quintales de soja"||f.moneda==="Quintales de maíz"?"qq":f.moneda==="Dólares"?"USD":"$"})`} type="number" value={f.monto||""} onChange={v=>sf("monto",v)} sx={{marginBottom:0}}/>
        </div>
        <FR>
          <Inp label="Inicio del contrato" type="date" value={f.inicio||""} onChange={v=>sf("inicio",v)}/>
          <Inp label="Vencimiento" type="date" value={f.vencimiento||""} onChange={v=>sf("vencimiento",v)}/>
        </FR>
        <FR>
          <Inp label="Estado" value={f.estado||"Vigente"} onChange={v=>sf("estado",v)} opts={["Vigente","En negociación","Vencido","Finalizado"]}/>
          <Inp label="Teléfono propietario" value={f.tel||""} onChange={v=>sf("tel",v)}/>
        </FR>
        <Inp label="Condiciones especiales / Notas" value={f.condiciones||""} onChange={v=>sf("condiciones",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>{setMA(false);setF({});}} sv="brown" onSave={()=>{
          const nd=f.id
            ?addMov({...db,arrendamientos:(db.arrendamientos||[]).map(x=>x.id===f.id?{...f}:x)},`✏️ Arrendamiento editado: ${f.campo}`)
            :addMov({...db,arrendamientos:[...(db.arrendamientos||[]),{id:Date.now(),...f}]},`📋 Arrendamiento: ${f.campo} ${f.ha}ha`);
          setDb(nd);setMA(false);setF({});
        }}/>
      </Modal>

      {/* MODAL PAGO */}
      <Modal open={mP} onClose={()=>{setMP(false);setSel(null);setF({});}} title="💰 Registrar Pago de Arrendamiento">
        {sel&&<InfoBox text={`📋 ${sel.campo||"—"} · ${sel.propietario||"—"} · ${sel.ha||"?"}ha`} color="brown" emoji=""/>}
        <FR>
          <Inp label="Fecha" type="date" value={f.fecha||hoy()} onChange={v=>sf("fecha",v)}/>
          <Inp label="Monto ($)" type="number" value={f.monto||""} onChange={v=>sf("monto",v)}/>
        </FR>
        <Inp label="Concepto / Período" value={f.concepto||""} onChange={v=>sf("concepto",v)} placeholder="Ej: Arrendamiento campaña 2024/25" sx={{marginBottom:9}}/>
        <Inp label="Nota" value={f.nota||""} onChange={v=>sf("nota",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>{setMP(false);setSel(null);setF({});}} sv="green" saveLabel="Registrar pago" onSave={()=>{
          const nd=addMov({...db,pagosArr:[...(db.pagosArr||[]),{id:Date.now(),...f,monto:parseFloat(f.monto)||0}]},`💰 Arrend. ${sel?sel.campo:"—"}: $${fmt(f.monto)}`);
          setDb(nd);setMP(false);setSel(null);setF({});
        }}/>
      </Modal>
    </div>
  );
}


// ── PRESUPUESTO POR CAMPAÑA ───────────────────────────────
function SecPresupuesto({db,setDb}){
  const [campania,setCampania]=useState(CAMPANIAS[3]);
  const [mI,setMI]=useState(false); // modal item
  const [f,setF]=useState({});const sf=(k,v)=>setF(p=>({...p,[k]:v}));

  const presupuestos=db.presupuestos||[];
  const itemsCamp=presupuestos.filter(p=>p.campania===campania);

  // Real de esa campaña
  const gastosReal=db.gastos.filter(g=>g.campania===campania||(g.fecha&&g.fecha.startsWith(campania.slice(0,4)))).reduce((s,g)=>s+(parseFloat(g.monto)||0),0);
  const insumosReal=(db.comprasIns||[]).filter(c=>c.fecha&&c.fecha.startsWith(campania.slice(0,4))).reduce((s,c)=>s+(parseFloat(c.precio||0)*parseFloat(c.qty||0)),0);
  const personalReal=db.pagos.filter(p=>p.fecha&&p.fecha.startsWith(campania.slice(0,4))).reduce((s,p)=>s+(parseFloat(p.monto)||0),0);
  const combReal=db.combustible.filter(c=>c.fecha&&c.fecha.startsWith(campania.slice(0,4))).reduce((s,c)=>s+(parseFloat(c.total)||0),0);
  const trabajosReal=(db.trabajos||[]).filter(t=>t.fecha&&t.fecha.startsWith(campania.slice(0,4))).reduce((s,t)=>s+(parseFloat(t.monto)||0),0);
  const totalReal=gastosReal+insumosReal+personalReal+combReal+trabajosReal;

  const ingresosReal=db.ventas.filter(v=>v.fecha&&v.fecha.startsWith(campania.slice(0,4))).reduce((s,v)=>s+(parseFloat(v.precio||0)*parseFloat(v.toneladas||0)*1000),0);

  // Presupuestado
  const totalPresupGastos=itemsCamp.filter(p=>p.tipo==="gasto").reduce((s,p)=>s+(parseFloat(p.monto)||0),0);
  const totalPresupIngresos=itemsCamp.filter(p=>p.tipo==="ingreso").reduce((s,p)=>s+(parseFloat(p.monto)||0),0);

  const CATS_GASTO=["Insumos/Agroquímicos","Semillas","Fertilizantes","Combustible","Mano de obra","Arrendamiento","Servicios/Contratistas","Fletes","Seguros","Maquinaria","Otros gastos"];
  const CATS_INGRESO=["Venta soja","Venta maíz","Venta trigo","Venta girasol","Venta animales","Otros ingresos"];

  return(
    <div>
      {/* Selector campaña */}
      <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:14,flexWrap:"wrap"}}>
        <span style={{fontSize:"0.75rem",fontWeight:800,color:C.md}}>Campaña:</span>
        {CAMPANIAS.map(cp=>(
          <button key={cp} onClick={()=>setCampania(cp)} style={{padding:"6px 14px",borderRadius:30,border:`1.5px solid ${cp===campania?C.az:"#e2e8f0"}`,background:cp===campania?C.az:"#fff",color:cp===campania?"#fff":C.md,fontSize:"0.76rem",fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>{cp}</button>
        ))}
      </div>

      <div style={{display:"flex",gap:7,marginBottom:12}}>
        <Btn v="blue" onClick={()=>{setF({campania,tipo:"gasto",cat:"Insumos/Agroquímicos"});setMI(true);}}>+ Ítem gasto</Btn>
        <Btn v="green" onClick={()=>{setF({campania,tipo:"ingreso",cat:"Venta soja"});setMI(true);}}>+ Ítem ingreso</Btn>
      </div>

      {/* Comparación presupuestado vs real */}
      {(totalPresupGastos>0||totalPresupIngresos>0)&&<>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
          {/* GASTOS */}
          <Panel accent={C.ro}>
            <div style={{fontSize:"0.7rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:8}}>💸 Gastos</div>
            <div style={{marginBottom:6}}>
              <div style={{fontSize:"0.7rem",color:C.md}}>Presupuestado</div>
              <div style={{fontSize:"1.1rem",fontWeight:900,color:C.dk}}>${fmt(totalPresupGastos)}</div>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:"0.7rem",color:C.md}}>Real</div>
              <div style={{fontSize:"1.1rem",fontWeight:900,color:totalReal>totalPresupGastos?C.ro:C.v}}>${fmt(totalReal)}</div>
            </div>
            {totalPresupGastos>0&&<>
              <div style={{background:"#f0f4f8",borderRadius:20,height:7,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(Math.round((totalReal/totalPresupGastos)*100),100)}%`,background:totalReal>totalPresupGastos?C.ro:C.v,borderRadius:20}}/>
              </div>
              <div style={{fontSize:"0.68rem",color:C.md,textAlign:"right",marginTop:2}}>{Math.round((totalReal/totalPresupGastos)*100)}% ejecutado</div>
            </>}
          </Panel>
          {/* INGRESOS */}
          <Panel accent={C.v}>
            <div style={{fontSize:"0.7rem",fontWeight:800,color:C.md,textTransform:"uppercase",marginBottom:8}}>💰 Ingresos</div>
            <div style={{marginBottom:6}}>
              <div style={{fontSize:"0.7rem",color:C.md}}>Presupuestado</div>
              <div style={{fontSize:"1.1rem",fontWeight:900,color:C.dk}}>${fmt(totalPresupIngresos)}</div>
            </div>
            <div style={{marginBottom:8}}>
              <div style={{fontSize:"0.7rem",color:C.md}}>Real</div>
              <div style={{fontSize:"1.1rem",fontWeight:900,color:ingresosReal>=totalPresupIngresos?C.v:C.na}}>${fmt(ingresosReal)}</div>
            </div>
            {totalPresupIngresos>0&&<>
              <div style={{background:"#f0f4f8",borderRadius:20,height:7,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${Math.min(Math.round((ingresosReal/totalPresupIngresos)*100),100)}%`,background:C.v,borderRadius:20}}/>
              </div>
              <div style={{fontSize:"0.68rem",color:C.md,textAlign:"right",marginTop:2}}>{Math.round((ingresosReal/totalPresupIngresos)*100)}% cobrado</div>
            </>}
          </Panel>
        </div>

        {/* Resultado presupuestado vs real */}
        <div style={{background:`linear-gradient(135deg,${C.dk},${C.dk2})`,borderRadius:16,padding:14,marginBottom:12}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <div style={{textAlign:"center"}}>
              <div style={{fontSize:"0.65rem",color:"rgba(255,255,255,.6)",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Resultado presupuestado</div>
              <div style={{fontSize:"1.2rem",fontWeight:900,color:totalPresupIngresos-totalPresupGastos>=0?C.v2:C.ro}}>{totalPresupIngresos-totalPresupGastos>=0?"+":""} ${fmt(totalPresupIngresos-totalPresupGastos)}</div>
            </div>
            <div style={{textAlign:"center",borderLeft:"1px solid rgba(255,255,255,.15)"}}>
              <div style={{fontSize:"0.65rem",color:"rgba(255,255,255,.6)",fontWeight:700,textTransform:"uppercase",marginBottom:4}}>Resultado real</div>
              <div style={{fontSize:"1.2rem",fontWeight:900,color:ingresosReal-totalReal>=0?C.v2:C.ro}}>{ingresosReal-totalReal>=0?"+":""} ${fmt(ingresosReal-totalReal)}</div>
            </div>
          </div>
        </div>
      </>}

      {/* Items presupuestados */}
      {itemsCamp.length===0&&<div style={{textAlign:"center",padding:30,color:C.lt}}>
        <div style={{fontSize:"2.5rem"}}>📊</div>
        <p style={{marginTop:8,fontWeight:600}}>Sin presupuesto para {campania}</p>
        <p style={{fontSize:"0.8rem",marginTop:4}}>Agregá ítems de ingresos y gastos esperados</p>
      </div>}

      {itemsCamp.length>0&&<>
        {/* Gastos presupuestados */}
        {itemsCamp.filter(i=>i.tipo==="gasto").length>0&&<Panel title="💸 Gastos presupuestados" accent={C.ro}>
          {itemsCamp.filter(i=>i.tipo==="gasto").map(item=>(
            <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f0f4f8"}}>
              <div>
                <div style={{fontWeight:700,fontSize:"0.85rem"}}>{item.concepto||item.cat}</div>
                <div style={{fontSize:"0.7rem",color:C.md}}>{item.cat}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:900,color:C.ro}}>${fmt(item.monto)}</span>
                <Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,presupuestos:(db.presupuestos||[]).filter(x=>x.id!==item.id)});}}>🗑️</Btn>
              </div>
            </div>
          ))}
        </Panel>}

        {/* Ingresos presupuestados */}
        {itemsCamp.filter(i=>i.tipo==="ingreso").length>0&&<Panel title="💰 Ingresos presupuestados" accent={C.v}>
          {itemsCamp.filter(i=>i.tipo==="ingreso").map(item=>(
            <div key={item.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"8px 0",borderBottom:"1px solid #f0f4f8"}}>
              <div>
                <div style={{fontWeight:700,fontSize:"0.85rem"}}>{item.concepto||item.cat}</div>
                <div style={{fontSize:"0.7rem",color:C.md}}>{item.cat}{item.toneladas?` · ${item.toneladas}t a $${fmt(item.precio)}/t`:""}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontWeight:900,color:C.v}}>${fmt(item.monto)}</span>
                <Btn sz="xs" v="danger" onClick={()=>{if(confirm("¿Eliminar?"))setDb({...db,presupuestos:(db.presupuestos||[]).filter(x=>x.id!==item.id)});}}>🗑️</Btn>
              </div>
            </div>
          ))}
        </Panel>}
      </>}

      {/* MODAL ITEM */}
      <Modal open={mI} onClose={()=>{setMI(false);setF({});}} title={f.tipo==="ingreso"?"💰 Ítem de ingreso esperado":"💸 Ítem de gasto esperado"}>
        <Inp label="Categoría" value={f.cat||""} onChange={v=>sf("cat",v)} opts={f.tipo==="ingreso"?CATS_INGRESO:CATS_GASTO} sx={{marginBottom:10}}/>
        <Inp label="Concepto / Descripción" value={f.concepto||""} onChange={v=>sf("concepto",v)} placeholder="Ej: Semilla soja 200 bolsas" sx={{marginBottom:10}}/>
        {f.tipo==="ingreso"&&<>
          <FR>
            <Inp label="Toneladas esperadas" type="number" value={f.toneladas||""} onChange={v=>{sf("toneladas",v);sf("monto",String(parseFloat(v||0)*parseFloat(f.precio||0)*1000));}}/>
            <Inp label="Precio estimado $/t" type="number" value={f.precio||""} onChange={v=>{sf("precio",v);sf("monto",String(parseFloat(f.toneladas||0)*parseFloat(v||0)*1000));}}/>
          </FR>
        </>}
        <Inp label="Monto total ($)" type="number" value={f.monto||""} onChange={v=>sf("monto",v)} sx={{marginBottom:4}}/>
        <MBtns onClose={()=>{setMI(false);setF({});}} sv={f.tipo==="ingreso"?"green":"orange"} onSave={()=>{
          const nd=addMov({...db,presupuestos:[...(db.presupuestos||[]),{id:Date.now(),...f,monto:parseFloat(f.monto)||0}]},`📊 Presup. ${f.tipo}: ${f.concepto||f.cat} $${fmt(f.monto)}`);
          setDb(nd);setMI(false);setF({});
        }}/>
      </Modal>
    </div>
  );
}


// ── GESTIÓN DE USUARIOS / PERMISOS ───────────────────────
function SecUsuarios({db,setDb,userEmail}){
  const [mU,setMU]=useState(false);
  const [f,setF]=useState({});const sf=(k,v)=>setF(p=>({...p,[k]:v}));

  const usuarios=db.usuarios||[];

  const ROLES=[
    {id:"admin",label:"👑 Administrador",desc:"Ve y edita todo. Sin restricciones.",color:C.ro},
    {id:"socio",label:"🤝 Socio / Dueño",desc:"Ve todo pero no puede cambiar usuarios ni borrar datos.",color:C.az},
    {id:"operario",label:"👷 Operario",desc:"Solo puede cargar datos operativos: labores, lluvias, siembras, sanidad. No ve precios ni gastos.",color:C.v},
    {id:"consulta",label:"👁️ Solo consulta",desc:"Solo puede ver, no puede cargar nada.",color:C.md},
  ];

  const PERMISOS_POR_ROL={
    admin:["todo"],
    socio:["ver_todo","editar_operativo","editar_financiero"],
    operario:["labores","siembra","lluvias","sanidad","animales_basico","tareas","cosecha_basico"],
    consulta:["ver_todo"]
  };

  return(
    <div>
      <InfoBox text="Agregá los emails de las personas que acceden a la app. Cada uno inicia sesión con su propia cuenta en Firebase." color="blue" emoji="👥"/>

      <div style={{display:"flex",gap:7,marginBottom:12}}>
        <Btn v="blue" onClick={()=>{setF({rol:"operario"});setMU(true);}}>+ Agregar usuario</Btn>
      </div>

      {/* Tu cuenta */}
      <Panel title="👑 Tu cuenta" accent={C.ro}>
        <div style={{display:"flex",alignItems:"center",gap:10,padding:"8px 0"}}>
          <div style={{width:40,height:40,borderRadius:"50%",background:`linear-gradient(135deg,${C.ro},${C.na})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.2rem",flexShrink:0}}>👑</div>
          <div>
            <div style={{fontWeight:800,fontSize:"0.9rem"}}>{userEmail||"Tu cuenta"}</div>
            <div style={{fontSize:"0.74rem",color:C.md}}>Administrador · Acceso total</div>
          </div>
        </div>
      </Panel>

      {/* Roles disponibles */}
      <Panel title="📋 Roles disponibles" accent={C.az}>
        {ROLES.map(r=>(
          <div key={r.id} style={{display:"flex",gap:10,padding:"10px 0",borderBottom:"1px solid #f0f4f8",alignItems:"flex-start"}}>
            <div style={{width:8,height:8,borderRadius:"50%",background:r.color,marginTop:6,flexShrink:0}}/>
            <div>
              <div style={{fontWeight:800,fontSize:"0.85rem"}}>{r.label}</div>
              <div style={{fontSize:"0.74rem",color:C.md,marginTop:2}}>{r.desc}</div>
            </div>
          </div>
        ))}
      </Panel>

      {/* Usuarios registrados */}
      {usuarios.length===0
        ?<div style={{textAlign:"center",padding:30,color:C.lt}}>
          <div style={{fontSize:"2.5rem"}}>👥</div>
          <p style={{marginTop:8,fontWeight:600}}>Sin usuarios adicionales</p>
          <p style={{fontSize:"0.8rem",marginTop:4}}>Agregá a tu papá o empleados para que accedan con sus emails</p>
        </div>
        :usuarios.map(u=>{
          const rol=ROLES.find(r=>r.id===u.rol)||ROLES[0];
          return(
            <Panel key={u.id} accent={rol.color}>

function SecDatos({db,setDb}){
  const ref=useRef();
  const [msg,setMsg]=useState("");

  const exportar=()=>{
    const json=JSON.stringify(db,null,2);
    const blob=new Blob([json],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;
    a.download="CampoRamihue_datos_"+new Date().toLocaleDateString("es-AR").replace(/\//g,"-")+".json";
    a.click();
    URL.revokeObjectURL(url);
    setMsg("✅ Datos exportados correctamente");
  };

  const importar=(file)=>{
    if(!file)return;
    const r=new FileReader();
    r.onload=e=>{
      try{
        const d=JSON.parse(e.target.result);
        if(!d.campos&&!d.gastos)throw new Error("Archivo inválido");
        if(!confirm("¿Importar estos datos? Se van a reemplazar los actuales."))return;
        setDb(d);
        try{localStorage.setItem("gfa2",JSON.stringify(d));}catch(err){}
        setMsg("✅ Datos importados correctamente");
      }catch(err){
        setMsg("❌ Error al leer el archivo. Verificá que sea un backup de GenAFarm.");
      }
    };
    r.readAsText(file);
  };

  return(
    <div>
      <InfoBox text="Exportá tus datos para hacer un backup o para pasarlos a otro dispositivo. Luego importalos en la nueva app." color="blue" emoji="💾"/>

      <Panel title="📤 Exportar mis datos" accent={C.v}>
        <p style={{fontSize:"0.82rem",color:C.dk2,marginBottom:14,lineHeight:1.5}}>Descargá un archivo con todos tus datos: campos, lotes, animales, gastos, cosechas y todo lo demás.</p>
        <Btn onClick={exportar} sx={{width:"100%",justifyContent:"center",marginBottom:8}}>💾 Descargar mis datos</Btn>
        <p style={{fontSize:"0.74rem",color:C.md,textAlign:"center"}}>Se descarga un archivo .json — guardalo en un lugar seguro</p>
      </Panel>

      <Panel title="📥 Importar datos" accent={C.az}>
        <p style={{fontSize:"0.82rem",color:C.dk2,marginBottom:14,lineHeight:1.5}}>Si ya tenés un backup descargado antes, subilo acá para recuperar todos tus datos.</p>
        <input ref={ref} type="file" accept=".json" style={{display:"none"}} onChange={e=>importar(e.target.files[0])}/>
        <Btn v="blue" onClick={()=>ref.current.click()} sx={{width:"100%",justifyContent:"center",marginBottom:8}}>📂 Seleccionar archivo de backup</Btn>
        <p style={{fontSize:"0.74rem",color:C.md,textAlign:"center"}}>⚠️ Esto reemplaza los datos actuales de la app</p>
      </Panel>

      {msg&&<div style={{background:msg.startsWith("✅")?C.v3:C.ro3,border:`1.5px solid ${msg.startsWith("✅")?"#b8f0d8":C.ro}`,borderRadius:13,padding:"14px 16px",textAlign:"center",fontSize:"0.88rem",fontWeight:700,color:msg.startsWith("✅")?C.v:C.ro}}>{msg}</div>}
    </div>
  );
}

function buildWA(db){
  const d=new Date().toLocaleDateString("es-AR");
  const gm=db.gastos.filter(g=>g.fecha.startsWith(mesActual())).reduce((s,g)=>s+g.monto,0);
  const mm=db.lluvias.filter(l=>l.fecha.startsWith(mesActual())).reduce((s,l)=>s+parseFloat(l.mm||0),0);
  return`🌾 *GENAFARM – Resumen*\n📅 ${d}\n\n🌍 Campos: ${db.campos.length} · Lotes: ${db.lotes.length}\n🐄 Animales: ${fmt(db.animales.reduce((s,a)=>s+a.cant,0))}\n🛍️ Silos activas: ${db.silos.filter(s=>s.estado==="Activa").length}\n🌧️ Lluvia este mes: ${mm.toFixed(0)}mm\n📦 Insumos: ${db.insumos.length}\n🌽 Cosecha: ${fmt(db.cosechas.reduce((s,c)=>s+(c.netos||0),0))} kg\n📋 Ventas pend.: ${fmt(db.ventas.filter(v=>v.estado==="Pendiente").reduce((s,v)=>s+(parseFloat(v.toneladas)||0),0))} t\n💰 Gastos mes: $${fmt(gm)}\n📅 Tareas pend.: ${db.tareas.filter(t=>t.est!=="Completada").length}\n\n_GenAFarm_`;
}

}

function App(){
  const [db,setDb]=useState(initDB);
  const [sec,setSec]=useState("dash");
  const [waO,setWaO]=useState(false);
  const [menuO,setMenuO]=useState(false);
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [syncing,setSyncing]=useState(false);

  // Auth listener
  useEffect(()=>{
    const unsub=fbAuth.onAuthStateChanged(u=>{
      setUser(u);
      setAuthLoading(false);
    });
    return ()=>unsub();
  },[]);

  // Firebase sync - listen to changes
  useEffect(()=>{
    if(!user)return;
    const dbRef=fbDb.ref("genafarm/datos");
    const handler=dbRef.on("value",(snapshot)=>{
      const data=snapshot.val();
      if(data){
        setDb({...initDB(),...data});
      }
    });
    return ()=>dbRef.off("value",handler);
  },[user]);

  const save=(nd)=>{
    setDb(nd);
    // Save to Firebase
    if(user){
      setSyncing(true);
      fbDb.ref("genafarm/datos").set(nd)
        .then(()=>setSyncing(false))
        .catch(()=>setSyncing(false));
    }
    // Also save locally as backup
    try{localStorage.setItem("gfa2",JSON.stringify(nd));}catch(e){}
  };

  if(authLoading){
    return(
      <div style={{minHeight:"100vh",background:"linear-gradient(135deg,#2ecc87,#3d84f5)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <div style={{fontSize:"3rem",marginBottom:12}}>🌾</div>
        <div style={{color:"#fff",fontSize:"1rem",fontWeight:700}}>Cargando...</div>
      </div>
    );
  }

  if(!user) return <Login/>;
  const si=NAVS.find(n=>n.id===sec);

  return(
    <div style={{fontFamily:"system-ui,-apple-system,sans-serif",background:C.bg,minHeight:"100vh",maxWidth:480,margin:"0 auto"}}>
      {/* HEADER */}
      <div style={{background:`linear-gradient(135deg,${C.v2},${C.az})`,padding:"0 16px",height:56,display:"flex",alignItems:"center",justifyContent:"space-between",position:"sticky",top:0,zIndex:100,boxShadow:`0 4px 20px ${C.v}44`}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <svg width="34" height="34" viewBox="0 0 34 34" fill="none" xmlns="http://www.w3.org/2000/svg" style={{flexShrink:0}}>
              <circle cx="17" cy="17" r="17" fill="rgba(255,255,255,0.22)"/>
              <text x="50%" y="57%" dominantBaseline="middle" textAnchor="middle" fontFamily="Georgia,serif" fontSize="15" fontWeight="bold" fontStyle="italic" fill="white" letterSpacing="-0.5">ER</text>
            </svg>
          <div>
            <div style={{fontSize:"1.1rem",fontWeight:900,color:"#fff",letterSpacing:"-0.3px",lineHeight:1}}>Campo Ramihue</div>
            <div style={{fontSize:"0.6rem",color:"rgba(255,255,255,0.7)",letterSpacing:"0.5px",textTransform:"uppercase"}}>Gestión agropecuaria</div>
          </div>
        </div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {syncing&&<span style={{fontSize:"0.7rem",color:"rgba(255,255,255,.7)"}}>⟳</span>}
          <button onClick={()=>setWaO(true)} style={{background:"rgba(255,255,255,.2)",border:"1.5px solid rgba(255,255,255,.4)",color:"#fff",padding:"5px 10px",borderRadius:30,fontSize:"0.74rem",fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>📤 WA</button>
          <button onClick={()=>fbAuth.signOut()} style={{background:"rgba(255,255,255,.15)",border:"1.5px solid rgba(255,255,255,.3)",color:"#fff",padding:"5px 10px",borderRadius:30,fontSize:"0.74rem",fontWeight:800,cursor:"pointer",fontFamily:"inherit"}} title="Cerrar sesión">🚪</button>
        </div>
      </div>

      {/* TÍTULO */}
      <div style={{padding:"13px 14px 0"}}>
        <h2 style={{fontSize:"1.1rem",fontWeight:900,color:C.dk,marginBottom:11}}>{(si&&si.i)} {(si&&si.l)}</h2>
      </div>

      {/* CONTENIDO */}
      <div style={{padding:"0 14px 88px"}}>
        {sec==="dash"     &&<SecDash db={db}/>}
        {sec==="campos"   &&<SecCampos db={db} setDb={save}/>}
        {sec==="animales" &&<SecAnimales db={db} setDb={save}/>}
        {sec==="silos"    &&<SecSilos db={db} setDb={save}/>}
        {sec==="cosecha"  &&<SecCosecha db={db} setDb={save}/>}
        {sec==="insumos"  &&<SecInsumos db={db} setDb={save}/>}
        {sec==="gastos"   &&<SecGastos db={db} setDb={save}/>}
        {sec==="siembra"  &&<SecSiembra db={db} setDb={save}/>}
        {sec==="labores"  &&<SecLabores db={db} setDb={save}/>}
        {sec==="aplics"   &&<SecAplicaciones db={db} setDb={save}/>}
        {sec==="lluvias"  &&<SecLluvias db={db} setDb={save}/>}
        {sec==="suelos"   &&<SecSuelos db={db} setDb={save}/>}
        {sec==="sanidad"  &&<SecSanidad db={db} setDb={save}/>}
        {sec==="pesadas"  &&<SecPesadas db={db} setDb={save}/>}
        {sec==="ventas"   &&<SecVentas db={db} setDb={save}/>}
        {sec==="maquinas" &&<SecMaquinas db={db} setDb={save}/>}
        {sec==="camiones" &&<SecCamiones db={db} setDb={save}/>}
        {sec==="personal" &&<SecPersonal db={db} setDb={save}/>}
        {sec==="comb"     &&<SecCombustible db={db} setDb={save}/>}
        {sec==="agenda"   &&<SecAgenda db={db} setDb={save}/>}
        {sec==="trabajos" &&<SecTrabajos db={db} setDb={save}/> }
        {sec==="resumen"  &&<SecResumen db={db}/> }
        {sec==="reporte"  &&<SecReporte db={db}/>}
        {sec==="stock"    &&<SecStockGranos db={db}/>}
        {sec==="arrendamientos"&&<SecArrendamientos db={db} setDb={save}/>}
        {sec==="presupuesto"&&<SecPresupuesto db={db} setDb={save}/>}
        {sec==="usuarios" &&<SecUsuarios db={db} setDb={save} userEmail={user&&user.email}/>}
        {sec==="datos"    &&<SecDatos db={db} setDb={save}/>}
      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:480,background:"#fff",borderTop:"1px solid #e8ecef",zIndex:99,boxShadow:"0 -4px 20px rgba(0,0,0,.08)"}}>
        <div style={{display:"flex"}}>
          {NAV_RAPIDO.map(n=>(
            <button key={n.id} onClick={()=>setSec(n.id)} style={{flex:1,padding:"10px 4px 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"inherit",fontSize:"0.68rem",fontWeight:800,color:sec===n.id?C.v:C.lt,textTransform:"uppercase",letterSpacing:"0.2px",transition:"color .15s",borderTop:sec===n.id?`2.5px solid ${C.v}`:"2.5px solid transparent"}}>
              <span style={{fontSize:"1.6rem",lineHeight:1,transform:sec===n.id?"translateY(-2px)":"none",transition:"transform .15s"}}>{n.i}</span>
              {n.l}
            </button>
          ))}
          <button onClick={()=>setMenuO(true)} style={{flex:1,padding:"10px 4px 8px",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,fontFamily:"inherit",fontSize:"0.68rem",fontWeight:800,color:menuO?C.v:C.lt,textTransform:"uppercase",letterSpacing:"0.2px",borderTop:menuO?`2.5px solid ${C.v}`:"2.5px solid transparent"}}>
            <span style={{fontSize:"1.6rem",lineHeight:1,transform:menuO?"translateY(-2px)":"none",transition:"transform .15s"}}>☰</span>
            Más
          </button>
        </div>
      </div>

      {/* MENÚ COMPLETO */}
      {menuO&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:200,display:"flex",alignItems:"flex-end",backdropFilter:"blur(3px)"}} onClick={()=>setMenuO(false)}>
          <div style={{background:"#fff",width:"100%",maxWidth:480,margin:"0 auto",borderRadius:"22px 22px 0 0",padding:"20px 16px 32px",boxShadow:"0 -8px 40px rgba(0,0,0,.2)"}} onClick={e=>e.stopPropagation()}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:18}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <circle cx="14" cy="14" r="14" fill="url(#mg1)"/>
                  <defs><linearGradient id="mg1" x1="0" y1="0" x2="28" y2="28" gradientUnits="userSpaceOnUse"><stop offset="0%" stopColor="#2ecc87"/><stop offset="100%" stopColor="#3d84f5"/></linearGradient></defs>
                  <text x="50%" y="57%" dominantBaseline="middle" textAnchor="middle" fontFamily="Georgia,serif" fontSize="12" fontWeight="bold" fontStyle="italic" fill="white">ER</text>
                </svg>
                <div style={{fontSize:"1rem",fontWeight:900,color:C.dk}}>Campo Ramihue</div>
              </div>
              <button onClick={()=>setMenuO(false)} style={{background:"#f0f4f8",border:"none",width:32,height:32,borderRadius:"50%",cursor:"pointer",fontSize:"1rem"}}>✕</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:10}}>
              {NAVS.map(n=>(
                <button key={n.id} onClick={()=>{setSec(n.id);setMenuO(false);}} style={{background:sec===n.id?C.v3:"#f4f7fa",border:`1.5px solid ${sec===n.id?C.v:"#e8ecef"}`,borderRadius:14,padding:"12px 6px",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:5,fontFamily:"inherit",transition:"all .15s"}}>
                  <span style={{fontSize:"1.7rem",lineHeight:1}}>{n.i}</span>
                  <span style={{fontSize:"0.65rem",fontWeight:800,color:sec===n.id?C.v:C.dk2,textAlign:"center",lineHeight:1.2,textTransform:"uppercase",letterSpacing:"0.2px"}}>{n.l}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      )}

      {/* WHATSAPP RESUMEN */}
      {waO&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.55)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:14,backdropFilter:"blur(4px)"}}>
          <div style={{background:"#fff",borderRadius:22,padding:22,width:"100%",maxWidth:490,boxShadow:"0 24px 64px rgba(0,0,0,.25)"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
              <h3 style={{fontSize:"1.05rem",fontWeight:900}}>📤 Compartir por WhatsApp</h3>
              <button onClick={()=>setWaO(false)} style={{background:"#f0f4f8",border:"none",width:30,height:30,borderRadius:"50%",cursor:"pointer"}}>✕</button>
            </div>
            <div style={{background:"#e9f7ef",borderRadius:11,padding:13,fontSize:"0.76rem",whiteSpace:"pre-wrap",wordBreak:"break-word",maxHeight:250,overflowY:"auto",fontFamily:"monospace",color:"#1a3a2a",lineHeight:1.6,marginBottom:12}}>{buildWA(db)}</div>
            <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
              <Btn v="ghost" onClick={()=>setWaO(false)}>Cerrar</Btn>
              <Btn v="wa" onClick={()=>window.open("https://wa.me/?text="+encodeURIComponent(buildWA(db)),"_blank")}>📱 Abrir WhatsApp</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
